<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบบริหารจัดการพัสดุ | จัดการคลังพัสดุ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: white; width: 500px; padding: 30px; border-radius: 8px; 
            border: 2px solid #000; box-shadow: var(--shadow-lg); 
        }
        .modal-header { font-size: 1.25rem; font-weight: 800; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="mpg-app">
        <!-- Sidebar -->
        <div class="mpg-sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-halved" style="margin-right: 10px; color: gold;"></i> SMART SCHOOL
            </div>
            <div class="sidebar-nav">
                <a href="admin_dashboard.html" class="nav-item">
                    <i class="fas fa-th-large"></i> แผงควบคุม (Dashboard)
                </a>
                <a href="admin_inventory.html" class="nav-item active">
                    <i class="fas fa-boxes"></i> จัดการพัสดุ
                </a>
                <a href="admin_transactions.html" class="nav-item">
                    <i class="fas fa-history"></i> ประวัติรายการทั้งหมด
                </a>
                <a href="admin_summary.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> รายงานสรุป
                </a>
            </div>
            <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
                <a href="index.html" class="nav-item" style="color: #ff7675;" onclick="localStorage.clear()">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mpg-main">
            <div class="top-bar">
                <div style="font-weight: 700; color: var(--brand-primary);">จัดการคลังพัสดุ (Inventory Management)</div>
                <button class="btn btn-primary" onclick="openModal('add')">
                    <i class="fas fa-plus"></i> เพิ่มพัสดุใหม่
                </button>
            </div>

            <div class="content-body">
                <div class="mpg-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <div style="position: relative; width: 300px;">
                            <i class="fas fa-search" style="position: absolute; left: 12px; top: 12px; color: #999;"></i>
                            <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="ค้นหาชื่อหรือรหัสพัสดุ..." style="padding-left: 35px; border-radius: 20px;">
                        </div>
                        <button class="btn" onclick="generateSeedData()" style="font-size: 0.75rem;">
                            <i class="fas fa-vial"></i> สร้างข้อมูลจำลอง (Seed)
                        </button>
                    </div>

                    <table class="mpg-table">
                        <thead>
                            <tr>
                                <th>รหัส</th>
                                <th>ชื่อพัสดุ</th>
                                <th>หมวดหมู่</th>
                                <th>คงเหลือ</th>
                                <th>สถานะ</th>
                                <th style="text-align: right;">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTbody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 40px;">
                                    <i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modalOverlay" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">เพิ่มพัสดุใหม่</div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>รหัสพัสดุ</label>
                <input type="text" id="item_id" placeholder="Ex: ITEM-001">
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>ชื่อพัสดุ</label>
                <input type="text" id="item_name" placeholder="ชื่อรายการพัสดุ">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>หมวดหมู่</label>
                    <input type="text" id="item_category" list="category_list" placeholder="หมวดหมู่">
                    <datalist id="category_list"></datalist>
                </div>
                <div class="form-group">
                    <label>สภาพ</label>
                    <select id="item_condition">
                        <option value="ปกติ">ปกติ</option>
                        <option value="ชำรุด">ชำรุด</option>
                        <option value="รอซ่อม">รอซ่อม</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>ยอดยกมา</label>
                    <input type="number" id="item_forward" value="0">
                </div>
                <div class="form-group">
                    <label>รับเข้าใหม่</label>
                    <input type="number" id="item_received" value="0">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label>หมายเหตุ</label>
                <textarea id="item_note" rows="2" style="width: 100%; border: 1px solid #a0aec0; border-radius: 4px; padding: 8px;"></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" id="btnSave" onclick="saveItem()" style="flex: 2;">ยืนยันข้อมูล</button>
                <button class="btn" onclick="closeModal()" style="flex: 1;">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxgR3YK2xU4aXjI4DgSk9eny_V2gZYvvLzPfpWq6IhC4BDuBR5IO_QNOHR4h3zLPqDU/exec";
        let allInventory = [];

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem("smart_school_user") || "{}");
            if (user.role !== 'ผู้ดูแลระบบ' && user.role !== 'Admin') { window.location.href = "index.html"; return; }
            loadAdminInventory();
            loadCategories();
        });

        async function loadCategories() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_categories' }) });
                const result = await res.json();
                if (result.status === 'success') {
                    document.getElementById('category_list').innerHTML = result.data.map(c => `<option value="${c}">${c}</option>`).join('');
                }
            } catch (err) {}
        }

        async function loadAdminInventory() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_inventory' }) });
                const result = await res.json();
                if (result.status === 'success') {
                    allInventory = result.data;
                    renderTable(result.data);
                }
            } catch (err) { console.error(err); }
        }

        function renderTable(items) {
            const tbody = document.getElementById('inventoryTbody');
            if (!items.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">ไม่พบข้อมูล</td></tr>'; return; }
            tbody.innerHTML = items.map(i => `
                <tr>
                    <td class="mono">${i.id}</td>
                    <td><strong>${i.name}</strong></td>
                    <td><span class="badge" style="background:#edf2f7; border:none;">${i.category}</span></td>
                    <td class="mono">${i.balance}</td>
                    <td>${Number(i.balance) <= 5 ? '<span class="mpg-badge badge-danger">สต๊อกต่ำ</span>' : '<span class="mpg-badge badge-success">ปกติ</span>'}</td>
                    <td style="text-align: right;">
                        <button class="btn" style="padding:4px 8px; font-size:11px;" onclick="openModal('edit', '${i.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn" style="padding:4px 8px; font-size:11px; color:red;" onclick="deleteItem('${i.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filterItems() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            renderTable(allInventory.filter(i => i.name.toLowerCase().includes(v) || i.id.toLowerCase().includes(v)));
        }

        let currentMode = 'add';
        function openModal(mode, id = null) {
            currentMode = mode;
            document.getElementById('modalOverlay').classList.add('active');
            if (mode === 'add') {
                document.getElementById('modalTitle').innerText = 'เพิ่มพัสดุใหม่';
                document.getElementById('item_id').disabled = false;
                ['item_id', 'item_name', 'item_category', 'item_forward', 'item_received', 'item_note'].forEach(f => document.getElementById(f).value = (f.includes('item_') ? '' : '0'));
                document.getElementById('item_condition').value = 'ปกติ';
            } else {
                document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลพัสดุ';
                document.getElementById('item_id').disabled = true;
                const i = allInventory.find(x => x.id === id);
                if (i) {
                    document.getElementById('item_id').value = i.id;
                    document.getElementById('item_name').value = i.name;
                    document.getElementById('item_category').value = i.category;
                    document.getElementById('item_condition').value = i.condition || 'ปกติ';
                    document.getElementById('item_forward').value = i.balanceForward;
                    document.getElementById('item_received').value = i.received;
                    document.getElementById('item_note').value = i.note;
                }
            }
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        async function saveItem() {
            const user = JSON.parse(localStorage.getItem("smart_school_user") || "{}");
            const data = {
                action: currentMode === 'add' ? 'add_item' : 'update_item',
                id: document.getElementById('item_id').value.trim(),
                name: document.getElementById('item_name').value.trim(),
                category: document.getElementById('item_category').value.trim(),
                condition: document.getElementById('item_condition').value,
                balanceForward: Number(document.getElementById('item_forward').value),
                received: Number(document.getElementById('item_received').value),
                note: document.getElementById('item_note').value.trim(),
                role: user.role
            };
            if (!data.id || !data.name) return alert("กรุณาระบุข้อมูลให้ครบถ้วน");
            try {
                const btn = document.getElementById('btnSave');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> บันทึก...';
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                const r = await res.json();
                if(r.status === 'success') { closeModal(); loadAdminInventory(); } else { alert(r.message); }
            } catch (e) { alert("ล้มเหลว"); } finally { document.getElementById('btnSave').disabled = false; document.getElementById('btnSave').innerHTML = 'ยืนยันข้อมูล'; }
        }

        async function deleteItem(id) {
            if (!confirm(`ยืนยันการลบ ${id}?`)) return;
            const user = JSON.parse(localStorage.getItem("smart_school_user") || "{}");
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete_item', id, role: user.role }) });
                loadAdminInventory();
            } catch (e) {}
        }

        async function generateSeedData() {
            if (!confirm("สร้างข้อมูลจำลอง?")) return;
            const user = JSON.parse(localStorage.getItem("smart_school_user") || "{}");
            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'seed_data', role: user.role }) }); loadAdminInventory(); } catch(e) {}
        }
    </script>
</body>
</html>
