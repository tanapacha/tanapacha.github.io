<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ด — ระบบเอกสารอิเล็กทรอนิกส์</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <!-- SweetAlert2 for Premium Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-icon-wrap {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
        }
        .stat-icon-orange { background: #fff7ed; }
        .stat-icon-blue   { background: #eff6ff; }
        .stat-icon-green  { background: #f0fdf4; }
        .stat-icon-purple { background: #faf5ff; }

        /* Timeline Modal */
        .modal-split {
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 24px;
        }
        @media (max-width: 600px) { .modal-split { grid-template-columns: 1fr; } }

        .table-link { color: var(--color-primary); font-weight: 600; font-size: 13px; cursor: pointer; }
        .table-link:hover { color: var(--color-primary-hover); }

        /* View toggle */
        .view-toggle {
            display: flex; border: 1px solid var(--color-border); border-radius: 8px;
            overflow: hidden;
        }
        .view-toggle-btn {
            padding: 5px 12px; background: none; border: none;
            cursor: pointer; color: var(--color-text-muted); font-size: 12px;
            font-family: var(--font-sans); font-weight: 600; transition: all 0.15s;
            display: flex; align-items: center; gap: 5px;
        }
        .view-toggle-btn.active { background: var(--color-primary); color: #fff; }
        .view-toggle-btn:not(.active):hover { background: var(--color-bg); }


    </style>
</head>
<body data-page-id="dashboard">
<div class="app-wrapper">
    <div id="sidebar-container" class="app-sidebar"></div>
    <div class="app-main">
        <header id="navbar-container" class="app-navbar"></header>
        <main class="app-content">
            <div class="container-lg">

                <!-- Smart Alert Banner -->
                <div id="smart-alert"></div>



                <!-- Stat Cards (Skeleton Area) -->
                <div class="stats-grid" id="stats-container">
                    <div class="stat-card stat-card-orange anim-fade-up">
                        <div class="skeleton-stat" style="width:100%"></div>
                    </div>
                    <div class="stat-card stat-card-blue anim-fade-up">
                        <div class="skeleton-stat" style="width:100%"></div>
                    </div>
                    <div class="stat-card stat-card-green anim-fade-up">
                        <div class="skeleton-stat" style="width:100%"></div>
                    </div>
                    <div class="stat-card stat-card-purple anim-fade-up">
                        <div class="skeleton-stat" style="width:100%"></div>
                    </div>
                </div>

                <!-- Documents Table -->
                <div class="card p-0 anim-fade-up anim-stagger-3">
                    <div style="padding:20px 24px 16px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;">
                        <div>
                            <h2 style="font-size:16px;font-weight:700;">เอกสารล่าสุดในระบบ</h2>
                            <p style="font-size:12px;color:var(--color-text-muted);margin:2px 0 0;">ข้อมูลทั้งหมดที่อยู่ในสายงานการพิจารณา</p>
                        </div>
                        <div style="display:flex;gap:8px;align-items:center;">
                            <div class="view-toggle">
                                <button class="view-toggle-btn active" id="btn-view-table" onclick="showView('table')">
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                                    ตาราง
                                </button>
                                <button class="view-toggle-btn" id="btn-view-kanban" onclick="showView('kanban')">
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18"/><rect x="10" y="3" width="5" height="12"/><rect x="17" y="3" width="5" height="15"/></svg>
                                    Kanban
                                </button>
                            </div>
                            <a href="history.html" class="btn btn-secondary btn-sm">ดูทั้งหมด →</a>
                        </div>
                    </div>
                    <div class="table-container" id="table-view">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>รหัสอ้างอิง</th>
                                    <th>หัวเรื่อง</th>
                                    <th>เจ้าของเรื่อง</th>
                                    <th>วันที่</th>
                                    <th>สถานะ</th>
                                    <th style="text-align:right;">ดูสายงาน</th>
                                </tr>
                            </thead>
                            <tbody id="docs-tbody">
                                <tr><td colspan="6"><div class="skeleton skeleton-row" style="border-radius:0;"></div></td></tr>
                                <tr><td colspan="6"><div class="skeleton skeleton-row" style="border-radius:0;animation-delay:0.1s"></div></td></tr>
                                <tr><td colspan="6"><div class="skeleton skeleton-row" style="border-radius:0;animation-delay:0.2s"></div></td></tr>
                                <tr><td colspan="6"><div class="skeleton skeleton-row" style="border-radius:0;animation-delay:0.3s"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Kanban Board (hidden by default) -->
                    <div id="kanban-view" style="display:none;padding:16px;">
                        <div class="kanban-board">
                            <div class="card p-0">
                                <div class="kanban-col-header">
                                    <span>⏳ รอพิจารณา</span>
                                    <span class="badge badge-orange" id="k-pending-count">0</span>
                                </div>
                                <div class="kanban-col-body" id="k-pending"></div>
                            </div>
                            <div class="card p-0">
                                <div class="kanban-col-header">
                                    <span>✅ อนุมัติแล้ว</span>
                                    <span class="badge badge-green" id="k-approved-count">0</span>
                                </div>
                                <div class="kanban-col-body" id="k-approved"></div>
                            </div>
                            <div class="card p-0">
                                <div class="kanban-col-header">
                                    <span>↩️ ถูกตีกลับ</span>
                                    <span class="badge badge-red" id="k-rejected-count">0</span>
                                </div>
                                <div class="kanban-col-body" id="k-rejected"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<!-- Workflow Timeline Modal -->
<div id="timeline-modal" class="modal-overlay">
    <div class="modal-card" style="max-width:640px;">
        <div class="modal-header">
            <div>
                <div class="modal-title" id="modal-doc-id"></div>
                <div style="font-size:12px;color:var(--color-text-muted);margin-top:2px;" id="modal-doc-type"></div>
            </div>
            <button class="btn-icon" onclick="closeTimeline()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <p style="font-size:15px;font-weight:700;color:var(--color-text);margin-bottom:20px;" id="modal-doc-title"></p>
            <div class="modal-split">
                <div id="modal-stepper"></div>
                <div id="modal-meta" style="border-left:1px solid var(--color-border);padding-left:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script src="core.js"></script>
<script>
    const docTypeLabels = {
        finance: 'งานการเงิน/พัสดุ', academic: 'งานวิชาการ',
        hr: 'งานบุคลากร', project: 'ขออนุมัติโครงการ',
        travel: 'เดินทางราชการ', general: 'เอกสารทั่วไป',
    };

    let currentDocs = [];

    function showView(mode) {
        document.getElementById('table-view').style.display  = mode==='table'  ? '' : 'none';
        document.getElementById('kanban-view').style.display = mode==='kanban' ? '' : 'none';
        document.getElementById('btn-view-table').classList.toggle('active', mode==='table');
        document.getElementById('btn-view-kanban').classList.toggle('active', mode==='kanban');
        if (mode==='kanban') renderKanban(currentDocs);
    }

    function renderKanban(docs) {
        const groups = { pending:[], approved:[], rejected:[] };
        docs.forEach(d => { if (groups[d.status]) groups[d.status].push(d); });
        ['pending','approved','rejected'].forEach(status => {
            const col = document.getElementById(`k-${status}`);
            const cnt = document.getElementById(`k-${status}-count`);
            cnt.textContent = groups[status].length;
            if (groups[status].length===0) {
                col.innerHTML='<div class="kanban-empty">ไม่มีเอกสาร</div>';
                return;
            }
            col.innerHTML = groups[status].map(doc => `
                <div class="kanban-card" onclick="openTimeline('${doc.id}')">
                    <div class="kanban-card-title">${doc.title.length>60?doc.title.substring(0,60)+'…':doc.title}</div>
                    <div class="kanban-card-meta">
                        ${doc.senderName} · ${doc.submittedDate}
                        ${doc.isUrgent?'<span class="badge badge-red" style="font-size:9px;">ด่วน</span>':''}
                    </div>
                </div>`).join('');
        });
    }

    function renderStatCards(stats) {
        const statsContainer = document.getElementById('stats-container');
        const cards = [
            { label: 'เอกสารของฉัน', value: stats.total, color: 'orange', icon: '<path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>' },
            { label: 'รอพิจารณา (ของฉัน)', value: stats.myPending, color: 'blue', icon: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>' },
            { label: 'อนุมัติแล้ว', value: stats.approved, color: 'green', icon: '<path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>' },
            { label: 'ถูกตีกลับ/ยกเลิก', value: stats.rejected, color: 'purple', icon: '<path d="M18.36 6.64l-1.42 1.42m0 0l-1.42 1.42m1.42-1.42l1.42 1.42m-1.42-1.42l-1.42-1.42M12 2v4m10 6h-4M2 12h4m6 10v-4" />' }
        ];

        statsContainer.innerHTML = cards.map((c, i) => `
            <div class="stat-card stat-card-${c.color} anim-fade-up" style="animation-delay: ${0.1 * (i+1)}s">
                <div class="stat-icon-wrap stat-icon-${c.color}">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${c.icon}</svg>
                </div>
                <div>
                    <div class="stat-label">${c.label}</div>
                    <div class="stat-value">${c.value}</div>
                </div>
            </div>
        `).join('');
    }

    function renderTable(docs) {
        const tbody = document.getElementById('docs-tbody');
        if (!docs || docs.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="6">
                    <div class="empty-state" style="padding:40px;">
                        <div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
                        <div class="empty-state-title">ยังไม่มีเอกสารในระบบ</div>
                        <div class="empty-state-desc">เริ่มต้นโดยการสร้างเอกสารฉบับแรก</div>
                        <a href="submitDoc.html" class="btn btn-primary btn-sm" style="margin-top:12px;">สร้างเอกสารใหม่</a>
                    </div>
                </td></tr>`;
            return;
        }

        tbody.innerHTML = docs.map(doc => `
            <tr ${doc.isUrgent && doc.status==='pending' ? 'class="is-urgent"' : ''}>
                <td class="mono fw-600" style="font-size:12px;">${doc.id}</td>
                <td>
                    <div style="font-weight:600;font-size:13px;">${doc.title.length > 50 ? doc.title.substring(0,50)+'…' : doc.title}</div>
                    ${doc.isUrgent ? '<span class="badge badge-red" style="margin-top:4px;">ด่วน</span>' : ''}
                </td>
                <td class="text-muted text-sm">${doc.senderName}</td>
                <td class="text-muted text-sm">${doc.submittedDate}</td>
                <td>${WorkflowEngine.renderBadge(doc.status)}</td>
                <td style="text-align:right;">
                    <button class="table-link" onclick="openTimeline('${doc.id}')">
                        ดูสายงาน →
                    </button>
                </td>
            </tr>`).join('');
    }

    function openTimeline(docId) {
        const doc = WorkflowEngine.getById(docId);
        if (!doc) return;
        document.getElementById('modal-doc-id').textContent = doc.id;
        document.getElementById('modal-doc-type').textContent = docTypeLabels[doc.docType] || doc.docType;
        document.getElementById('modal-doc-title').textContent = doc.title;
        document.getElementById('modal-stepper').innerHTML = WorkflowEngine.renderStepperHTML(doc.workflowSteps, doc.currentStepIndex);
        document.getElementById('modal-meta').innerHTML = `
            <div style="margin-bottom:14px;">
                <div class="text-xs text-faint fw-700" style="text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">ผู้ยื่นเรื่อง</div>
                <div class="fw-600" style="font-size:13px;">${doc.senderName}</div>
                <div class="text-xs text-muted">${doc.department}</div>
            </div>
            <div style="margin-bottom:14px;">
                <div class="text-xs text-faint fw-700" style="text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">สถานะปัจจุบัน</div>
                ${WorkflowEngine.renderBadge(doc.status)}
            </div>
            <div style="margin-bottom:14px;">
                <div class="text-xs text-faint fw-700" style="text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">วันที่ยื่น</div>
                <div class="text-sm">${doc.submittedDate}</div>
            </div>
            ${doc.fileLink ? `
            <div style="margin-top:20px; margin-bottom:12px;">
                <a href="${doc.fileLink}" target="_blank" class="btn btn-outline w-full btn-sm" style="display:flex; align-items:center; justify-content:center; gap:8px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                    เปิดดูเอกสารแนบ
                </a>
            </div>` : ''}
            ${doc.status === 'pending' ? `
            <div style="margin-top:8px;">
                <a href="approval.html" class="btn btn-primary w-full btn-sm">พิจารณาเอกสาร</a>
            </div>` : ''}
            ${doc.rejectedReason ? `
            <div class="wf-step__comment" style="margin-top:12px;">
                <strong>เหตุผลตีกลับ:</strong><br>${doc.rejectedReason}
            </div>` : ''}
        `;
        document.getElementById('timeline-modal').classList.add('active');
    }

    function closeTimeline() {
        document.getElementById('timeline-modal').classList.remove('active');
    }
    document.getElementById('timeline-modal').addEventListener('click', function(e) {
        if (e.target === this) closeTimeline();
    });

    function renderSmartAlert(stats, role) {
        const alertEl = document.getElementById('smart-alert');
        if (stats.myPending > 0) {
            alertEl.innerHTML = `
                <a href="approval.html" class="alert-banner alert-banner-orange anim-fade-up">
                    <span class="alert-banner-icon">📬</span>
                    <div class="alert-banner-text">
                        <span class="alert-banner-title">คุณมี ${stats.myPending} เอกสารที่รอให้คุณพิจารณาอนุมัติ</span>
                        <span class="alert-banner-cta">คลิกเพื่อไปยังกล่องพิจารณาอนุมัติ</span>
                    </div>
                    <span class="alert-banner-arrow">→</span>
                </a>`;
        } else if (stats.pending > 0) {
            alertEl.innerHTML = `
                <div class="alert-banner alert-banner-blue anim-fade-up">
                    <span class="alert-banner-icon">ℹ️</span>
                    <div class="alert-banner-text">
                        <span class="alert-banner-title">เอกสารของคุณ ${stats.pending} ฉบับกำลังรอดำเนินการ</span>
                        <span class="alert-banner-cta">ตรวจสอบสถานะได้ที่ตารางด้านล่าง</span>
                    </div>
                </div>`;
        } else {
            alertEl.innerHTML = '';
        }
    }

    window.onRoleChanged = function(role) {
        const stats = WorkflowEngine.getStats();
        renderSmartAlert(stats, role);
    };

    async function loadDashboard() {
        const user = API.getUser();
        if (!user) {
            location.href = 'index.html';
            return;
        }
        const role = user.role;
        try {
            const [stats, docs] = await Promise.all([
                API.getDashboardStats(user.email),
                API.getRecentDocuments(user.email),
            ]);

            if ((stats && stats.status === 'error') || (docs && docs.status === 'error')) {
                throw new Error(stats.message || docs.message || 'ข้อมูลไม่ถูกต้อง');
            }
            
            WorkflowEngine.setStats(stats); // Store stats for UI feedback
            WorkflowEngine.setLastLoadedDocs(docs); // For timeline view
            currentDocs = Array.isArray(docs) ? docs : [];
            renderSmartAlert(stats, role);
            renderStatCards(stats);
            renderTable(currentDocs);
        } catch (e) {
            console.error(e);
            UI.showToast('ไม่สามารถโหลดข้อมูลได้', 'error');
        }
    }

    loadDashboard();
</script>
</body>
</html>
