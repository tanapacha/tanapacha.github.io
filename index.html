<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aura LifeOS | Dashboard</title>
    <meta name="description" content="Aura LifeOS — ระบบจัดการชีวิตอัจฉริยะ ตารางเรียน สุขภาพ การเงิน เป้าหมาย">
    
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aura LifeOS">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#050608">
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: 'var(--accent)',
                        midnight: '#09090b',
                        accent: 'var(--accent)',
                    }
                }
            }
        }

        // Clean Theme Engine — subtle time-based accent shift
        const applyTheme = () => {
            const h = new Date().getHours();
            const r = document.documentElement;
            if (h >= 6 && h < 12) {
                r.style.setProperty('--accent', '#818cf8');
                r.style.setProperty('--accent-glow', 'rgba(129,140,248,0.15)');
                r.style.setProperty('--aura-primary', '#818cf8');
                r.style.setProperty('--aura-glow', 'rgba(129,140,248,0.15)');
            } else if (h >= 12 && h < 17) {
                r.style.setProperty('--accent', '#67e8f9');
                r.style.setProperty('--accent-glow', 'rgba(103,232,249,0.15)');
                r.style.setProperty('--aura-primary', '#67e8f9');
                r.style.setProperty('--aura-glow', 'rgba(103,232,249,0.15)');
            } else {
                r.style.setProperty('--accent', '#a78bfa');
                r.style.setProperty('--accent-glow', 'rgba(167,139,250,0.15)');
                r.style.setProperty('--aura-primary', '#a78bfa');
                r.style.setProperty('--aura-glow', 'rgba(167,139,250,0.15)');
            }
        };
        applyTheme();
        setInterval(applyTheme, 15 * 60 * 1000);
    </script>
</head>
<body>
    <div id="root">
        <div style="padding:24px; color: rgba(255,255,255,0.55); font: 14px/1.5 'Inter', system-ui, sans-serif;">
            กำลังโหลด Aura LifeOS...
        </div>
    </div>

    <script>
        (function () {
            const OVERLAY_ID = '__aura_boot_overlay__';
            const escapeHtml = (s) => String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            const ensureOverlay = () => {
                let el = document.getElementById(OVERLAY_ID);
                if (el) return el;
                el = document.createElement('div');
                el.id = OVERLAY_ID;
                el.style.cssText = [
                    'position:fixed',
                    'inset:0',
                    'z-index:999999',
                    'background:rgba(8,9,13,0.95)',
                    'backdrop-filter:blur(16px)',
                    '-webkit-backdrop-filter:blur(16px)',
                    'color:rgba(255,255,255,0.9)',
                    'padding:24px',
                    'display:none',
                    'overflow:auto',
                    "font:14px/1.6 'Inter', system-ui, sans-serif"
                ].join(';');
                document.body.appendChild(el);
                return el;
            };

            const showOverlay = (title, detailsHtml) => {
                const el = ensureOverlay();
                el.style.display = 'block';
                el.innerHTML = [
                    `<div style="max-width:920px; margin:0 auto;">`,
                    `<h1 style="font-size:18px; margin:0 0 12px;">${escapeHtml(title)}</h1>`,
                    `<div style="color:rgba(255,255,255,0.7); font-size:12px; margin:0 0 18px;">Aura Boot Diagnostics</div>`,
                    `<div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:16px;">${detailsHtml}</div>`,
                    `<div style="margin-top:16px; display:flex; gap:12px; flex-wrap:wrap;">`,
                    `<button id="__aura_boot_reload__" style="padding:10px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.9); cursor:pointer;">Reload</button>`,
                    `<button id="__aura_boot_close__" style="padding:10px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:rgba(255,255,255,0.7); cursor:pointer;">Close</button>`,
                    `</div>`,
                    `</div>`
                ].join('');

                const reloadBtn = document.getElementById('__aura_boot_reload__');
                const closeBtn = document.getElementById('__aura_boot_close__');
                reloadBtn && reloadBtn.addEventListener('click', () => location.reload());
                closeBtn && closeBtn.addEventListener('click', () => { el.style.display = 'none'; });
            };

            const formatStack = (stack) => {
                if (!stack) return '';
                return `<pre style="margin:12px 0 0; padding:12px; border-radius:12px; background:rgba(0,0,0,0.35); color:rgba(255,255,255,0.75); overflow:auto;">${escapeHtml(stack)}</pre>`;
            };

            window.addEventListener('error', (event) => {
                const msg = event?.message || 'Unknown error';
                const src = event?.filename ? `${event.filename}:${event.lineno || 0}:${event.colno || 0}` : '';
                const details = [
                    `<div><b>Message:</b> ${escapeHtml(msg)}</div>`,
                    src ? `<div style="margin-top:6px;"><b>Source:</b> ${escapeHtml(src)}</div>` : '',
                    formatStack(event?.error?.stack)
                ].join('');
                showOverlay('JavaScript Error', details);
            });

            window.addEventListener('unhandledrejection', (event) => {
                const reason = event?.reason;
                const msg = (reason && (reason.message || reason.toString())) || 'Unhandled rejection';
                const details = [
                    `<div><b>Reason:</b> ${escapeHtml(msg)}</div>`,
                    formatStack(reason?.stack)
                ].join('');
                showOverlay('Unhandled Promise Rejection', details);
            });

            window.addEventListener('load', () => {
                setTimeout(() => {
                    if (window.__AURA_MOUNTED__ === true) return;

                    const hasReact = !!window.React;
                    const hasReactDOM = !!window.ReactDOM;
                    const hasBabel = !!window.Babel;

                    const checks = [
                        { name: 'React', ok: hasReact },
                        { name: 'ReactDOM', ok: hasReactDOM },
                        { name: 'Babel Standalone', ok: hasBabel },
                        { name: 'Tailwind', ok: !!window.tailwind },
                        { name: 'Lucide', ok: !!window.lucide }
                    ];

                    const list = checks.map(c => {
                        const color = c.ok ? 'rgba(120,255,180,0.9)' : 'rgba(255,120,120,0.95)';
                        const badge = c.ok ? 'OK' : 'MISSING';
                        return `<div style="display:flex; justify-content:space-between; gap:12px; padding:8px 10px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); margin-top:8px;">` +
                            `<span>${escapeHtml(c.name)}</span>` +
                            `<span style="color:${color}; font-weight:700; letter-spacing:0.06em; font-size:12px;">${badge}</span>` +
                            `</div>`;
                    }).join('');

                    const waitingFor = Array.isArray(window.__AURA_BOOT_WAITING_FOR__) && window.__AURA_BOOT_WAITING_FOR__.length
                        ? `<div style="margin-top:14px;"><b>กำลังรอคอมโพเนนต์:</b> ${escapeHtml(window.__AURA_BOOT_WAITING_FOR__.join(', '))}</div>`
                        : '';

                    const hint = (!hasBabel)
                        ? `<div style="margin-top:12px; color:rgba(255,255,255,0.75);">หน้าเว็บนี้ใช้ <b>Babel</b> เพื่อรันไฟล์ <code style=\"color:rgba(255,255,255,0.9)\">type=\"text/babel\"</code>. ถ้า Babel โหลดไม่ขึ้น หน้าเลยจะว่าง/มืดแบบนี้</div>`
                        : `<div style="margin-top:12px; color:rgba(255,255,255,0.75);">ไลบรารีโหลดครบ แต่แอปยังไม่ mount — ดู error ใน Console หรือส่งภาพ overlay นี้ให้ผมได้เลย</div>`;

                    showOverlay('หน้าไม่แสดงผล (ยังไม่ mount)', `<div>สถานะการโหลดไลบรารี:</div>${list}${waitingFor}${hint}`);
                }, 6500);
            });
        })();
    </script>

    <script type="text/babel" src="js/api/api-client.js?v=5"></script>
    <script type="text/babel" src="js/utils/voice-engine.js?v=5"></script>
    <script type="text/babel" src="js/components/Navbar.js?v=5"></script>
    <script type="text/babel" src="js/components/BentoCard.js?v=5"></script>
    <script type="text/babel" src="js/components/HabitHeatmap.js?v=5"></script>
    <script type="text/babel" src="js/components/FocusOverlay.js?v=5"></script>
    <script type="text/babel" src="js/components/JournalModal.js?v=5"></script>
    <script type="text/babel" src="js/components/ResourceSaver.js?v=5"></script>
    <script type="text/babel" src="js/components/MealAnalyzer.js?v=5"></script>
    <script type="text/babel" src="js/pages/dashboard.js?v=5"></script>
    
    <script type="text/babel">
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.getRegistrations().then(regs => {
                    for(let reg of regs) { reg.unregister(); }
                });

                navigator.serviceWorker.register('sw.js?v=3')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error', err));
            });
        }

        // Scroll effect for nav
        window.addEventListener('scroll', () => {
            const navs = document.querySelectorAll('nav');
            navs.forEach(nav => {
                if (window.scrollY > 20) {
                    nav.classList.add('glass-active');
                } else {
                    nav.classList.remove('glass-active');
                }
            });
        });
    </script>

</body>
</html>
