<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | Smart School Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #f0f2f5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-logo-circle {
            width: 70px; 
            height: 70px; 
            background: var(--brand-dark); 
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px; 
            margin: 0 auto 15px;
        }
        .login-title { font-size: 1.5rem; font-weight: 800; color: var(--brand-primary); margin: 0; }
        .login-subtitle { font-size: 0.9rem; color: #666; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--brand-primary); margin-bottom: 8px; }

        .footer-action {
            text-align: center; 
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="mpg-card login-container">
        <div class="login-header">
            <div class="login-logo-circle">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1 class="login-title">Smart School</h1>
            <p class="login-subtitle">ระบบบริหารจัดการพัสดุโรงเรียน</p>
        </div>

        <div class="form-group">
            <label><i class="fas fa-user-circle"></i> ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" id="loginUser" placeholder="พิมพ์ชื่อผู้ใช้งาน">
        </div>

        <div class="form-group">
            <label><i class="fas fa-key"></i> รหัสผ่าน (Password)</label>
            <input type="password" id="loginPass" placeholder="••••••••">
        </div>

        <button class="btn btn-primary" id="btnLogin" onclick="handleLogin()" style="width: 100%; padding: 15px; font-size: 1rem;">
            เข้าสู่ระบบ (Sign In)
        </button>

        <div class="footer-action">
            <span style="font-size: 0.9rem; color: #666;">ยังไม่มีบัญชี?</span>
            <a href="register.html" style="font-size: 0.9rem; font-weight: 700; color: var(--brand-primary); text-decoration: none;">ลงทะเบียนเข้าใช้งาน</a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxgR3YK2xU4aXjI4DgSk9eny_V2gZYvvLzPfpWq6IhC4BDuBR5IO_QNOHR4h3zLPqDU/exec";

        async function handleLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('btnLogin');

            if (!user || !pass) {
                alert('กรุณากรอกชื่อผู้ใช้และรหัสผ่านให้ครบถ้วน');
                return;
            }

            const originalBtnText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบ...`;
            btn.disabled = true;

            const cleanUser = user.trim();
            const cleanPass = (!isNaN(pass) && pass.trim() !== '') ? String(pass.trim()) : pass.trim();

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'login',
                        username: cleanUser,
                        password: cleanPass
                    })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('smart_school_user', JSON.stringify(data.data));
                    if (data.data.role === 'ผู้ดูแลระบบ' || data.data.role === 'Admin') {
                        window.location.href = 'admin_dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
            }
        }
    </script>
</body>
</html>
