<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — ระบบเอกสารอิเล็กทรอนิกส์ คณะครุศาสตร์</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <!-- SweetAlert2 for Premium Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .auth-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative blobs */
        .auth-layout::before, .auth-layout::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
        }
        .auth-layout::before {
            width: 700px; height: 700px;
            top: -200px; right: -200px;
            background: radial-gradient(circle, rgba(234,88,12,0.07) 0%, transparent 70%);
        }
        .auth-layout::after {
            width: 500px; height: 500px;
            bottom: -150px; left: -150px;
            background: radial-gradient(circle, rgba(37,99,235,0.05) 0%, transparent 70%);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(226,232,240,0.8);
            border-radius: 24px;
            box-shadow:
                0 24px 48px -12px rgba(0,0,0,0.10),
                0 0 0 1px rgba(255,255,255,0.5) inset;
            padding: 44px 40px;
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            position: relative;
            z-index: 1;
        }
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(32px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }
        .logo-ring {
            width: 80px; height: 80px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(15,23,42,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
            animation: logoBounce 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both;
            overflow: hidden;
        }
        @keyframes logoBounce {
            from { opacity: 0; transform: scale(0.7) rotate(-5deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .logo-ring img {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        .auth-title {
            font-size: 22px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.03em;
            text-align: center;
            margin: 0 0 6px;
        }
        .auth-subtitle {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin: 0;
        }


        .divider-text {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0;
            color: #94a3b8; font-size: 12px;
        }
        .divider-text::before, .divider-text::after {
            content: ''; flex: 1; height: 1px; background: #e2e8f0;
        }

        .footer-links {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-card">
            <div class="logo-container">
                <div class="logo-ring">
                    <img src="logo.png" alt="คณะครุศาสตร์ NPU">
                </div>
                <h1 class="auth-title">ลงชื่อเข้าใช้งาน</h1>
                <p class="auth-subtitle">คณะครุศาสตร์ มหาวิทยาลัยนครพนม</p>
            </div>


            <form id="login-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">อีเมลองค์กร</label>
                    <input type="email" id="email" class="form-input"
                           placeholder="you@npu.ac.th"
                           value=""
                           autocomplete="email" required>
                </div>

                <div class="form-group" style="margin-bottom:24px;">
                    <div class="flex justify-between items-center" style="margin-bottom:6px;">
                        <label class="form-label" for="password" style="margin:0;">รหัสผ่าน</label>
                        <a href="#" style="font-size:12px;font-weight:600;">ลืมรหัสผ่าน?</a>
                    </div>
                    <input type="password" id="password" class="form-input"
                           placeholder="••••••••"
                           value=""
                           autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-login">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
                    </svg>
                    เข้าสู่ระบบ
                </button>
            </form>


            <div class="footer-links">
                <span class="text-muted text-sm">สำหรับบุคลากรใหม่ </span>
                <a href="register.html" style="font-size:13px;font-weight:600;">ลงทะเบียนเปิดใช้งาน →</a>
            </div>
        </div>
    </div>

    <script src="core.js"></script>
</body>
</html>
