<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบบริหารจัดการพัสดุ | ประวัติการเบิก-คืน</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="mpg-app">
        <div class="mpg-sidebar">
            <div class="sidebar-header"><i class="fas fa-box-open" style="color: gold;"></i> SMART SCHOOL</div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-th-large"></i> หน้าหลัก
                </a>
                <a href="borrow.html" class="nav-item">
                    <i class="fas fa-cart-plus"></i> เบิกพัสดุ
                </a>
                <a href="return.html" class="nav-item">
                    <i class="fas fa-undo"></i> คืนพัสดุ
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fas fa-search-plus"></i> คลังพัสดุ
                </a>
                <a href="summary.html" class="nav-item active">
                    <i class="fas fa-list-alt"></i> รายงานสรุป
                </a>
                <div id="adminLinkPlaceholder"></div>
            </div>
            <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
                <a href="index.html" class="nav-item" style="color: #ff7675;" onclick="localStorage.clear()">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </a>
            </div>
        </div>

        <div class="mpg-main">
            <div class="top-bar">
                <div style="font-weight: 700;">ประวัติการเบิกและคืนพัสดุ (User History)</div>
                <div id="userNameDisplay">...</div>
            </div>

            <div class="content-body">
                <div class="mpg-card">
                    <div style="background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; border: 1px solid var(--mpg-border);">
                        <div style="flex: 1; position: relative;">
                            <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                            <input type="text" id="searchInput" onkeyup="filterHistory()" placeholder="ค้นหาประวัติการเบิกพัสดุ..." style="padding-left: 45px; border-radius: 10px; height: 50px; font-size: 1rem; border: 2px solid #e2e8f0; width: 100%;">
                        </div>
                    </div>

                    <table class="mpg-table">
                        <thead>
                            <tr>
                                <th>วันที่ทำรายการ</th>
                                <th>รายการพัสดุ / รหัส</th>
                                <th>กำหนดคืน</th>
                                <th style="text-align: center;">สถานะ</th>
                                <th style="text-align: right;">ข้อมูล</th>
                            </tr>
                        </thead>
                        <tbody id="historyTbody">
                            <tr><td colspan="5" style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดประวัติ...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxgR3YK2xU4aXjI4DgSk9eny_V2gZYvvLzPfpWq6IhC4BDuBR5IO_QNOHR4h3zLPqDU/exec";
        let allHistory = [];

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('smart_school_user'));
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('userNameDisplay').innerText = user.name || user.username;
            if (user.role === 'ผู้ดูแลระบบ' || user.role === 'Admin') document.getElementById('adminLinkPlaceholder').innerHTML = `<a href="admin_dashboard.html" class="nav-item"><i class="fas fa-lock"></i> Admin Portal</a>`;
            loadHistory(user.user_id || user.username);
        });

        async function loadHistory(uid) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'get_my_history', userId: uid })
                });
                const d = await res.json();
                if (d.status === 'success') {
                    allHistory = d.data;
                    renderTable(d.data);
                }
            } catch (e) {
                document.getElementById('historyTbody').innerHTML = '<tr><td colspan="5" style="text-align:center;">ล้มเหลวในการดึงข้อมูล</td></tr>';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('historyTbody');
            if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">ไม่พบประวัติรายการ</td></tr>'; return; }
            tbody.innerHTML = data.map(i => {
                const isReturned = i.status.includes('คืนแล้ว');
                const isOverdue = i.status.includes('เกินกำหนด') || i.status.includes('ค้าง');
                let badge = '';
                if (isReturned) badge = '';
                else if (isOverdue) badge = 'badge-danger';
                else badge = 'badge-success';

                return `
                    <tr>
                        <td class="mono">${new Date(i.date).toLocaleDateString('th-TH')}</td>
                        <td>
                            <div style="font-weight: 700;">${i.item_name}</div>
                            <div class="mono" style="font-size: 11px; color: #999;">${i.item_id}</div>
                        </td>
                        <td class="mono">${i.due_date ? new Date(i.due_date).toLocaleDateString('th-TH') : '-'}</td>
                        <td style="text-align: center;"><span class="mpg-badge ${badge}">${i.status}</span></td>
                        <td style="text-align: right;">
                            <button class="btn" style="padding: 4px 8px; font-size: 11px;" onclick="alert('เหตุผล: ${i.reason || "-"}')"><i class="fas fa-info-circle"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterHistory() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            renderTable(allHistory.filter(h => h.item_name.toLowerCase().includes(v)));
        }
    </script>
</body>
</html>
