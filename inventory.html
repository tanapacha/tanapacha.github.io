<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบบริหารจัดการพัสดุ | คลังพัสดุกลาง</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="mpg-app">
        <!-- Sidebar -->
        <div class="mpg-sidebar">
            <div class="sidebar-header">
                <i class="fas fa-box-open" style="margin-right: 10px; color: gold;"></i> SMART SCHOOL
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-th-large"></i> หน้าหลัก
                </a>
                <a href="borrow.html" class="nav-item">
                    <i class="fas fa-cart-plus"></i> เบิกพัสดุ
                </a>
                <a href="return.html" class="nav-item">
                    <i class="fas fa-undo"></i> คืนพัสดุ
                </a>
                <a href="inventory.html" class="nav-item active">
                    <i class="fas fa-search-plus"></i> คลังพัสดุ
                </a>
                <a href="summary.html" class="nav-item">
                    <i class="fas fa-list-alt"></i> รายงานสรุป
                </a>
                <div id="adminLinkPlaceholder"></div>
            </div>
            <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
                <a href="index.html" class="nav-item" style="color: #ff7675;" onclick="localStorage.clear()">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mpg-main">
            <div class="top-bar">
                <div style="font-weight: 700; color: var(--brand-primary);">รายการพัสดุคงคลัง (Global Inventory)</div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span id="userNameDisplay" style="font-size: 0.9rem; font-weight: 600;">...</span>
                    <i class="fas fa-user-circle" style="font-size: 1.8rem; color: #ccc;"></i>
                </div>
            </div>

            <div class="content-body">
                <div class="mpg-card">
                    <div style="background: #f8fafc; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--mpg-border);">
                        <div style="position: relative; max-width: 600px; margin: 0 auto;">
                            <i class="fas fa-search" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.2rem;"></i>
                            <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="ค้นหารหัสพัสดุ หรือ ชื่อพัสดุที่คุณต้องการ..." style="padding: 0 25px 0 55px; border-radius: 50px; height: 55px; font-size: 1.1rem; border: 2px solid #e2e8f0; width: 100%; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                        </div>
                    </div>

                    <table class="mpg-table">
                        <thead>
                            <tr>
                                <th>รหัสพัสดุ</th>
                                <th>ชื่อรายการพัสดุ</th>
                                <th>หมวดหมู่</th>
                                <th style="text-align: center;">ยอดยกมา</th>
                                <th style="text-align: center; color: var(--success);">รับ</th>
                                <th style="text-align: center; color: var(--danger);">จ่าย</th>
                                <th style="text-align: center; font-weight: 800;">คงเหลือ</th>
                                <th>สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTbody">
                            <tr><td colspan="8" style="text-align: center; padding: 60px;"><i class="fas fa-spinner fa-spin"></i> กำลังโหลด...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxgR3YK2xU4aXjI4DgSk9eny_V2gZYvvLzPfpWq6IhC4BDuBR5IO_QNOHR4h3zLPqDU/exec";
        let allItems = [];

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('smart_school_user'));
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('userNameDisplay').innerText = user.name || user.username;
            if (user.role === 'ผู้ดูแลระบบ' || user.role === 'Admin') {
                document.getElementById('adminLinkPlaceholder').innerHTML = `<a href="admin_dashboard.html" class="nav-item" style="background: rgba(255,255,255,0.05);"><i class="fas fa-lock"></i> หน้าผู้ดูแลระบบ</a>`;
            }
            loadInventory();
        });

        async function loadInventory() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_inventory" }) });
                const result = await res.json();
                if (result.status === "success") {
                    allItems = result.data;
                    renderTable(result.data);
                }
            } catch (error) { console.error(error); }
        }

        function renderTable(items) {
            const tbody = document.getElementById('inventoryTbody');
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">ไม่พบข้อมูล</td></tr>';
                return;
            }
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td class="mono">${item.id}</td>
                    <td style="font-weight: 700;">${item.name}</td>
                    <td>${item.category}</td>
                    <td style="text-align: center;">${item.balanceForward || 0}</td>
                    <td style="text-align: center; color: var(--success); font-weight: 600;">${item.received || 0}</td>
                    <td style="text-align: center; color: var(--danger); font-weight: 600;">${item.dispensed || 0}</td>
                    <td style="text-align: center; font-weight: 800; color: var(--brand-primary); font-size: 1.1rem;">${item.balance || 0}</td>
                    <td>
                        <span class="mpg-badge ${item.balance > 0 ? 'badge-success' : 'badge-danger'}">
                            ${item.balance > 0 ? 'พร้อมเบิก' : 'พัสดุหมด'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function filterItems() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            renderTable(allItems.filter(i => i.name.toLowerCase().includes(v) || i.id.toLowerCase().includes(v)));
        }
    </script>
</body>
</html>
