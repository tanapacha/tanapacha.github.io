<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบทดสอบ: ระบบสุริยะ — KIDDO LEARNING</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body style="background:var(--bg-app);">

<!-- Quiz Header -->
<header style="background:var(--bg-surface);border-bottom:1px solid var(--border-subtle);position:sticky;top:0;z-index:50;">
  <div style="max-width:900px;margin:0 auto;padding:0 var(--sp-8);height:68px;display:flex;align-items:center;justify-content:space-between;gap:var(--sp-6);">
    <div class="flex items-center gap-4">
      <a href="play-lesson.html" class="btn btn-ghost btn-sm">
        <span data-icon="left"></span> ออก
      </a>
      <div>
        <div class="fw-semibold t-small">แบบฝึกหัด: บล็อกคำสั่งและการเคลื่อนที่</div>
        <div class="t-small t-secondary">วิทยาการคำนวณ · หัวข้อที่ 2</div>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <!-- Timer -->
      <div class="flex items-center gap-2" style="background:var(--bg-raised);padding:var(--sp-2) var(--sp-4);border-radius:var(--radius-sm);">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="timerDisplay" class="fw-semibold t-small" style="font-variant-numeric:tabular-nums;">10:00</span>
      </div>
      <!-- Progress text -->
      <span class="t-small t-secondary" id="questionCounter">ข้อ 1 / 5</span>
    </div>
  </div>
  <!-- Overall progress bar -->
  <div class="progress" style="border-radius:0;height:3px;">
    <div class="progress-fill" id="quizProgress" style="width:20%;"></div>
  </div>
</header>

<!-- Quiz Body -->
<main style="max-width:760px;margin:0 auto;padding:var(--sp-10) var(--sp-8);">
  <div id="questionArea" class="anim-fade-up">
    <!-- Question -->
    <div class="t-label t-secondary" style="margin-bottom:var(--sp-4);" id="questionNum">ข้อที่ 1</div>
    <div class="quiz-question" id="questionText">
      บล็อกคำสั่งใดใช้สำหรับทำให้ตัวละครเคลื่อนที่ไปข้างหน้า?
    </div>

    <!-- Options -->
    <div style="display:flex;flex-direction:column;gap:var(--sp-3);" id="optionsArea">
      <button class="quiz-option" onclick="selectOption(this,'a')">
        <span class="quiz-option-key">ก</span>
        <span class="quiz-option-text">Say Hello</span>
      </button>
      <button class="quiz-option" onclick="selectOption(this,'b')">
        <span class="quiz-option-key">ข</span>
        <span class="quiz-option-text">Move 10 steps</span>
      </button>
      <button class="quiz-option" onclick="selectOption(this,'c')">
        <span class="quiz-option-key">ค</span>
        <span class="quiz-option-text">Turn 15 degrees</span>
      </button>
      <button class="quiz-option" onclick="selectOption(this,'d')">
        <span class="quiz-option-key">ง</span>
        <span class="quiz-option-text">Wait 1 seconds</span>
      </button>
    </div>

    <!-- Feedback (hidden initially) -->
    <div id="feedbackArea" style="display:none;margin-top:var(--sp-6);">
      <div id="feedbackCard" class="alert">
        <span id="feedbackText" style="display:flex;align-items:center;gap:var(--sp-2);"></span>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="flex justify-between items-center" style="margin-top:var(--sp-8);">
    <button class="btn btn-ghost btn-sm" id="prevBtn" disabled onclick="prevQ()">
      <span data-icon="left"></span> ก่อนหน้า
    </button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" disabled>
      ข้อถัดไป <span data-icon="right"></span>
    </button>
  </div>

</main>

<!-- Result Modal -->
<dialog id="resultModal" style="border:none;border-radius:var(--radius-xl);padding:0;width:min(500px,90vw);box-shadow:var(--shadow-lg);background:var(--bg-surface);">
  <div style="padding:var(--sp-10);text-align:center;">
    <div style="color:var(--color-primary-500); margin-bottom:var(--sp-4); display:flex; justify-content:center;" id="resultEmoji">
       <span data-icon="award" style="width:64px;height:64px;display:block;"></span>
    </div>
    <h2 class="t-subheading" style="margin-bottom:var(--sp-2);" id="resultTitle">ยอดเยี่ยมมาก!</h2>
    <p class="t-body t-secondary" id="resultDesc">คุณเข้าใจพื้นฐานการสั่งงาน Scratch แล้ว!</p>
    <div style="display:flex;align-items:center;justify-content:center;gap:var(--sp-8);margin:var(--sp-8) 0;padding:var(--sp-6);background:var(--bg-raised);border-radius:var(--radius-lg);">
      <div>
        <div class="stat-num" id="resultScore">0</div>
        <div class="stat-label">คะแนนที่ได้</div>
      </div>
      <div style="width:1px;height:40px;background:var(--border-subtle);"></div>
      <div>
        <div class="stat-num" id="resultPercent">0%</div>
        <div class="stat-label">ความถูกต้อง</div>
      </div>
    </div>
    <div class="flex gap-3 justify-center">
      <button class="btn btn-outline" onclick="location.reload()">ลองอีกครั้ง</button>
      <a href="dashboard.html" class="btn btn-primary">กลับหน้าหลัก</a>
    </div>
  </div>
</dialog>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  Auth.requireAuth();

  const questions = [
    { q:'บล็อกคำสั่งใดใช้สำหรับทำให้ตัวละครเคลื่อนที่ไปข้างหน้า?', opts:['Say Hello','Move 10 steps','Turn 15 degrees','Wait 1 seconds'], ans:'b', explain:'บล็อก Move ใช้สำหรับเลื่อนตำแหน่งตัวละครไปตามทิศทางที่หันหน้าอยู่' },
    { q:'หากต้องการให้คำสั่งทำงานเมื่อกด "ธงเขียว" ต้องใช้บล็อกใด?', opts:['When space key pressed','When this sprite clicked','When Green Flag clicked','Wait 1 seconds'], ans:'c', explain:'ธงเขียวเป็นปุ่มมาตรฐานในการเริ่มรันโปรแกรมใน Scratch' },
    { q:'บล็อก "Forever" อยู่ในกลุ่มคำสั่งสีอะไร?', opts:['สีน้ำเงิน (Motion)','สีส้ม (Control)','สีม่วง (Looks)','สีเหลือง (Events)'], ans:'b', explain:'บล็อกควบคุมการวนซ้ำและการรอ จะอยู่ในกลุ่ม Control สีส้ม' },
    { q:'บล็อกใดใช้สำหรับเปลี่ยนสีหรือขนาดของตัวละคร?', opts:['Motion','Control','Looks','Sound'], ans:'c', explain:'กลุ่ม Looks ใช้จัดการรูปลักษณ์ภายนอกของ Sprite' },
    { q:'หากต้องการวนซ้ำคำสั่ง 10 ครั้ง ต้องใช้บล็อกใด?', opts:['Forever','Repeat 10','If then','Wait 10'], ans:'b', explain:'บล็อก Repeat ใช้สำหรับการวนซ้ำในจำนวนรอบที่แน่นอน' },
  ];

  const KEY_MAP = { a:0, b:1, c:2, d:3 };
  let current = 0, selected = null, score = 0;
  const answers = Array(questions.length).fill(null);

  function render() {
    const q = questions[current];
    document.getElementById('questionNum').textContent = `ข้อที่ ${current+1}`;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('questionCounter').textContent = `ข้อ ${current+1} / ${questions.length}`;
    document.getElementById('quizProgress').style.width = `${((current+1)/questions.length)*100}%`;

    const keys = ['a','b','c','d'];
    const area = document.getElementById('optionsArea');
    area.innerHTML = q.opts.map((opt,i)=>`
      <button class="quiz-option${answers[current]===keys[i]?' selected':''}" onclick="selectOption(this,'${keys[i]}')" ${answers[current]!==null&&answers[current]!==keys[i]?'disabled':''}>
        <span class="quiz-option-key">${['ก','ข','ค','ง'][i]}</span>
        <span class="quiz-option-text">${opt}</span>
      </button>`).join('');

    const fb = document.getElementById('feedbackArea');
    if(answers[current]!==null) {
      showFeedback(answers[current]);
    } else {
      fb.style.display='none';
    }

    document.getElementById('prevBtn').disabled = current===0;
    document.getElementById('nextBtn').disabled = answers[current]===null;
    document.getElementById('nextBtn').textContent = current===questions.length-1 ? 'ส่งคำตอบ' : 'ข้อถัดไป →';
  }

  function selectOption(el, key) {
    if(answers[current]!==null) return;
    answers[current]=key;
    if(key===questions[current].ans) score++;
    document.querySelectorAll('.quiz-option').forEach(opt=>opt.disabled=true);
    el.classList.remove('selected');
    document.querySelectorAll('.quiz-option').forEach((opt,i)=>{
      const k=['a','b','c','d'][i];
      if(k===questions[current].ans) opt.classList.add('correct');
      else if(k===key) opt.classList.add('wrong');
    });
    showFeedback(key);
    document.getElementById('nextBtn').disabled=false;
  }

  function showFeedback(key) {
    const isCorrect = key===questions[current].ans;
    const fb=document.getElementById('feedbackArea');
    const fc=document.getElementById('feedbackCard');
    const ft=document.getElementById('feedbackText');
    fb.style.display='flex';
    fc.className=`alert ${isCorrect?'alert-success':'alert-error'}`;
    const iconSpan = isCorrect ? '<span data-icon="checkCircle" style="width:20px;height:20px;"></span>' : '';
    ft.innerHTML=`${iconSpan} <span>${isCorrect?'ถูกต้อง!':'ไม่ถูกต้อง ·'} ${questions[current].explain}</span>`;
    window.Icon.render(); // Ensure new icons render
  }

  function nextQ() {
    if(current<questions.length-1){current++;render();}
    else showResult();
  }
  function prevQ() { if(current>0){current--;render();} }

  function showResult() {
    const pct=Math.round(score/questions.length*100);
    document.getElementById('resultScore').textContent=`${score}/${questions.length}`;
    document.getElementById('resultPercent').textContent=`${pct}%`;
    document.getElementById('resultTitle').textContent=pct>=80?'ยอดเยี่ยมมาก!':pct>=60?'ทำได้ดี!':'ลองใหม่อีกครั้งนะ';
    
    let iconName = pct >= 80 ? 'award' : pct >= 60 ? 'sparkles' : 'book';
    document.getElementById('resultEmoji').innerHTML=`<div style="animation: stickerPop 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;"><span data-icon="${iconName}" style="width:64px;height:64px;display:block;"></span></div>`;
    
    if (window.app && window.app.initIcons) window.app.initIcons();
    else if (window.Icon && window.Icon.render) window.Icon.render();

    // Optimistic UI for saving grade
    const user = window.Auth?.get();
    if (user && window.ApiService) {
      window.ApiService.saveQuizGrade({ studentId: user.id, lessonId: 'Q1', score: score, maxScore: questions.length, type: 'quiz' });
    }

    document.getElementById('resultModal').showModal();
  }

  // Start timer 10 min
  startTimer(document.getElementById('timerDisplay'), 600);

  render();
</script>
</body>
</html>
