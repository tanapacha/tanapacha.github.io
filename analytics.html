<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura LifeOS - Correlation Analytics</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="css/styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#09090b',
                        gold: '#818cf8',
                        'text-secondary': '#a1a1aa'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-midnight text-white overflow-x-hidden">
    <div id="root"></div>

    <!-- Fallback & Diagnostic -->
    <div id="boot-diagnostic" style="position:fixed; inset:0; z-index:9999; background:#000; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif; text-align:center; padding:20px;">
        <div style="font-size:24px; font-weight:bold; margin-bottom:10px; color:#818cf8;">Aura LifeOS</div>
        <div style="font-size:14px; opacity:0.6; margin-bottom:30px;">ศูนย์วิเคราะห์ความสัมพันธ์อัจฉริยะ</div>
        <div style="width:40px; height:40px; border:3px solid rgba(129,140,248,0.2); border-top-color:#818cf8; border-radius:50%; animation:spin 1s linear infinite;"></div>
        <div style="margin-top:20px; font-size:12px; color:rgba(255,255,255,0.4);">กำลังประมวลผลข้อมูลและวิเคราะห์แนวโน้ม...</div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scrollbar-hidden::-webkit-scrollbar { display: none; }
        #boot-diagnostic { transition: opacity 0.5s ease-out; }
    </style>

    <!-- Components -->
    <script type="text/babel" src="js/api/api-client.js"></script>
    <script type="text/babel" src="js/components/Navbar.js"></script>
    <script type="text/babel" src="js/components/BentoCard.js"></script>
    <script type="text/babel" src="js/pages/analytics.js"></script>
</body>
</html>
