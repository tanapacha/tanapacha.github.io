<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ลงทะเบียนผู้ใช้ | SMART SCHOOL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="mpg-card" style="width: 100%; max-width: 500px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 70px; height: 70px; background: var(--brand-dark); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 15px;">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1 style="margin:0; font-size: 1.5rem; color: var(--brand-primary);">สร้างบัญชีผู้ใช้งาน</h1>
            <p style="color: #666; font-size: 0.9rem;">กรอกข้อมูลเพื่อเข้าใช้งานระบบพัสดุ</p>
        </div>

        <form id="regForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div class="form-group">
                    <label style="font-size: 0.8rem; font-weight: 700;">ชื่อจริง</label>
                    <input type="text" id="firstName" placeholder="สมชาย" required>
                </div>
                <div class="form-group">
                    <label style="font-size: 0.8rem; font-weight: 700;">นามสกุล</label>
                    <input type="text" id="lastName" placeholder="ใจดี" required>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-size: 0.8rem; font-weight: 700;">ฝ่ายงาน / กลุ่มสาระ</label>
                <select id="department" required>
                    <option value="" disabled selected>เลือกฝ่ายงาน / กลุ่มสาระ...</option>
                    <hr>
                    <option value="กลุ่มสาระการเรียนรู้ภาษาไทย">กลุ่มสาระการเรียนรู้ภาษาไทย</option>
                    <option value="กลุ่มสาระการเรียนรู้คณิตศาสตร์">กลุ่มสาระการเรียนรู้คณิตศาสตร์</option>
                    <option value="กลุ่มสาระการเรียนรู้วิทยาศาสตร์และเทคโนโลยี">กลุ่มสาระการเรียนรู้วิทยาศาสตร์และเทคโนโลยี</option>
                    <option value="กลุ่มสาระการเรียนรู้สังคมศึกษา ศาสนา และวัฒนธรรม">กลุ่มสาระการเรียนรู้สังคมศึกษา ศาสนา และวัฒนธรรม</option>
                    <option value="กลุ่มสาระการเรียนรู้สุขศึกษาและพลศึกษา">กลุ่มสาระการเรียนรู้สุขศึกษาและพลศึกษา</option>
                    <option value="กลุ่มสาระการเรียนรู้ศิลปะ">กลุ่มสาระการเรียนรู้ศิลปะ</option>
                    <option value="กลุ่มสาระการเรียนรู้การงานอาชีพ">กลุ่มสาระการเรียนรู้การงานอาชีพ</option>
                    <option value="กลุ่มสาระการเรียนรู้ภาษาต่างประเทศ">กลุ่มสาระการเรียนรู้ภาษาต่างประเทศ</option>
                    <hr>
                    <option value="ฝ่ายบริหารงานวิชาการ">ฝ่ายบริหารงานวิชาการ</option>
                    <option value="ฝ่ายบริหารงานงบประมาณ">ฝ่ายบริหารงานงบประมาณ</option>
                    <option value="ฝ่ายบริหารงานบุคคล">ฝ่ายบริหารงานบุคคล</option>
                    <option value="ฝ่ายบริหารงานทั่วไป">ฝ่ายบริหารงานทั่วไป</option>
                    <option value="ฝ่ายบริหารส่วนกลาง / สำนักงาน">ฝ่ายบริหารส่วนกลาง / สำนักงาน</option>
                    <option value="กิจกรรมพัฒนาผู้เรียน">กิจกรรมพัฒนาผู้เรียน</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-size: 0.8rem; font-weight: 700;">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" placeholder="user_name" required>
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="font-size: 0.8rem; font-weight: 700;">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="อย่างน้อย 8 ตัวอักษร" required>
            </div>
            
            <button type="submit" class="btn btn-primary" id="btnSubmit" style="width: 100%; padding: 15px; font-size: 1rem;">
                ยืนยันการลงทะเบียน
            </button>
            <div style="text-align: center; margin-top: 20px;">
                <span style="font-size: 0.9rem; color: #666;">มีบัญชีอยู่แล้ว?</span>
                <a href="index.html" style="font-size: 0.9rem; font-weight: 700; color: var(--brand-primary); text-decoration: none;">เข้าสู่ระบบ</a>
            </div>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxgR3YK2xU4aXjI4DgSk9eny_V2gZYvvLzPfpWq6IhC4BDuBR5IO_QNOHR4h3zLPqDU/exec";
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const data = {
                action: 'register',
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value.trim(),
                full_name: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
                department: document.getElementById('department').value
            };
            if(data.password.length < 8) return alert("รหัสผ่านสั้นเกินไป");
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                const r = await res.json();
                if(r.status === 'success') { alert("ลงทะเบียนสำเร็จ!"); window.location.href="index.html"; }
                else { alert(r.message); }
            } catch(e) { alert("ล้มเหลว"); } finally { btn.disabled = false; btn.innerHTML = 'ยืนยันการลงทะเบียน'; }
        });
    </script>
</body>
</html>
