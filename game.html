<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ห้องเรียนเกมแสนสนุก | KIDDO CS</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .game-container {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--sp-8);
      min-height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* Matching */
    .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; max-width: 700px; }
    .match-col { display: flex; flex-direction: column; gap: 12px; }
    .match-item { 
      padding: 20px; background: white; border: 2px solid var(--border-subtle); 
      border-radius: 16px; cursor: pointer; transition: all 0.2s; 
      font-weight: 600; text-align: center; box-shadow: var(--shadow-sm);
    }
    .match-item:hover { transform: translateY(-3px); border-color: var(--color-primary-400); }
    .match-item.selected { border-color: var(--color-primary-500); background: var(--color-primary-50); box-shadow: 0 0 0 4px var(--color-primary-100); }
    .match-item.correct { border-color: var(--color-success); background: var(--color-success-bg); color: var(--color-success); opacity: 0.6; pointer-events: none; }
    .match-item.wrong { animation: shake 0.4s; border-color: var(--color-error); }

    /* Flashcard */
    .flash-scene { width: 400px; height: 300px; perspective: 1000px; cursor: pointer; }
    .flash-card { 
      width: 100%; height: 100%; position: relative; 
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
      transform-style: preserve-3d; 
    }
    .flash-card.is-flipped { transform: rotateY(180deg); }
    .flash-face { 
      position: absolute; width: 100%; height: 100%; 
      backface-visibility: hidden; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; border-radius: 24px; 
      padding: 32px; text-align: center; box-shadow: var(--shadow-lg); 
      border: 6px solid white;
    }
    .flash-front { background: var(--grad-primary); color: white; }
    .flash-back { background: var(--color-success); color: white; transform: rotateY(180deg); }

    /* Sequence */
    .seq-list { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
    .seq-item { 
      padding: 16px 24px; background: white; border: 2px solid var(--border-subtle); 
      border-radius: 12px; cursor: grab; display: flex; align-items: center; gap: 15px;
      font-weight: 600;
    }
    .seq-item.dragging { opacity: 0.5; }

    /* Sorting */
    .sort-bins { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-top: 40px; }
    .sort-bin { 
      min-height: 200px; background: var(--bg-raised); border: 3px dashed var(--border-subtle); 
      border-radius: 20px; padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; 
      align-content: flex-start; transition: all 0.2s;
    }
    .sort-bin.drag-over { border-color: var(--color-primary-500); background: var(--color-primary-50); }
    .sort-item { 
      padding: 12px 20px; background: white; border: 2px solid var(--border-subtle); 
      border-radius: 10px; cursor: grab; font-weight: 600; box-shadow: var(--shadow-sm);
    }

    /* Logic T/F */
    .logic-card { 
      width: 100%; max-width: 500px; background: white; border-radius: 24px; 
      padding: 40px; text-align: center; box-shadow: var(--shadow-xl); 
      border: 1px solid var(--border-subtle);
    }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="javascript:history.back()" class="flex items-center gap-2 t-secondary t-small">
        <span data-icon="left"></span> กลับบทเรียน
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">คะแนนสะสม</div>
      <div class="card p-6 t-center">
        <div id="gameScore" class="t-3xl fw-bold t-primary-color">0</div>
        <div class="t-xs t-secondary uppercase fw-bold">คะแนน</div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="page-header">
      <div>
        <h1 id="gameTitle" class="t-subheading">กำลังโหลดเกม...</h1>
        <p id="gameDesc" class="t-small t-secondary">เตรียมตัวให้พร้อมนะเด็กๆ</p>
      </div>
    </header>

    <div class="page-body">
      <div id="gameView" class="game-container anim-fade-up">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  let score = 0;
  let currentGame = null;

  async function loadGame() {
    const urlParams = new URLSearchParams(window.location.search);
    const quizId = urlParams.get('id');
    const lessonId = urlParams.get('lessonId');

    if (!quizId && !lessonId) {
      renderGameError("ไม่พบพารามิเตอร์ที่จำเป็นสำหรับตัวเกม");
      return;
    }

    try {
      // Fetch quiz data
      const res = await ApiService.getQuizzes(lessonId);
      if (res.status !== 'success') {
        throw new Error(res.message || "ไม่สามารถติดต่อฐานข้อมูลภารกิจเกมได้");
      }
      
      const quiz = res.data.find(q => q.ID === quizId) || res.data[0];
      if (!quiz) {
        throw new Error("ไม่พบกิจกรรมเกมที่ระบุในบทเรียนนี้");
      }
      
      if (!quiz.QuizURL) {
        throw new Error("ไม่พบโครงสร้างข้อมูลตัวเกม (Quiz URL ว่างเปล่า)");
      }
      
      try {
        currentGame = JSON.parse(quiz.QuizURL);
        document.getElementById('gameTitle').textContent = quiz.Title;
        renderGame();
      } catch (e) {
        console.error("JSON Parse error:", e);
        throw new Error("รูปแบบข้อมูลเกมไม่ถูกต้อง ไม่สามารถถอดรหัสได้");
      }
    } catch (err) {
      console.error(err);
      renderGameError(err.message);
    }
  }

  function renderGameError(message) {
    document.getElementById('gameTitle').textContent = "เกิดข้อผิดพลาดในการโหลดเกม";
    document.getElementById('gameDesc').textContent = "ขออภัยในความไม่สะดวกครับเด็กๆ";
    document.getElementById('gameView').innerHTML = `
      <div class="card p-16 t-center animate-in" style="max-width: 600px; margin: 40px auto; border: 1.5px solid var(--border-subtle);">
        <div class="avatar mb-6 animate-pulse" style="margin:0 auto; width:80px; height:80px; background:var(--color-error-50); color:var(--color-error-500); border:none; border-radius: 24px;">
          <span data-icon="alert" style="width:40px; height:40px;"></span>
        </div>
        <h3 class="t-title mb-4" style="font-size: 1.5rem; color: var(--color-error-600);">ไม่สามารถเริ่มกิจกรรมเกมได้</h3>
        <p class="t-body">เกิดข้อผิดพลาดในการเตรียมระบบเกมนี้สำหรับคุณครูและนักเรียน<br><span class="t-xs t-secondary">${message || ''}</span></p>
        <div class="flex gap-4 justify-center mt-8">
          <button onclick="location.reload()" class="btn btn-primary" style="height: 44px; padding: 0 24px; border-radius: var(--radius-sm);">ลองใหม่อีกครั้ง</button>
          <a href="dashboard.html" class="btn btn-outline" style="height: 44px; padding: 0 24px; border-radius: var(--radius-sm);">กลับหน้าหลัก</a>
        </div>
      </div>
    `;
    if (window.UI && window.UI.initIcons) window.UI.initIcons();
  }

  function renderGame() {
    const container = document.getElementById('gameView');
    const type = currentGame.type;
    
    if (type === 'matching') renderMatching(container);
    else if (type === 'flashcard') renderFlashcards(container);
    else if (type === 'sequence') renderSequence(container);
    else if (type === 'sorting') renderSorting(container);
    else if (type === 'logic') renderLogic(container);
  }

  // --- Game Renderers ---

  function renderMatching(container) {
    const items = currentGame.items;
    const lefts = [...items].sort(() => Math.random() - 0.5);
    const rights = [...items].sort(() => Math.random() - 0.5);
    
    container.innerHTML = `
      <p class="t-sm t-secondary mb-8">จับคู่สิ่งที่สัมพันธ์กันให้ถูกต้อง</p>
      <div class="matching-grid">
        <div class="match-col" id="leftCol">
          ${lefts.map(it => `<div class="match-item" data-id="${it.a + it.b}" onclick="handleMatch(this, 'left')">${it.a}</div>`).join('')}
        </div>
        <div class="match-col" id="rightCol">
          ${rights.map(it => `<div class="match-item" data-id="${it.a + it.b}" onclick="handleMatch(this, 'right')">${it.b}</div>`).join('')}
        </div>
      </div>
    `;
  }

  let selLeft = null, selRight = null;
  function handleMatch(el, side) {
    if (el.classList.contains('correct')) return;
    if (side === 'left') {
      document.querySelectorAll('#leftCol .match-item').forEach(i => i.classList.remove('selected'));
      selLeft = el;
    } else {
      document.querySelectorAll('#rightCol .match-item').forEach(i => i.classList.remove('selected'));
      selRight = el;
    }
    el.classList.add('selected');

    if (selLeft && selRight) {
      if (selLeft.dataset.id === selRight.dataset.id) {
        selLeft.classList.add('correct'); selRight.classList.add('correct');
        score += 20; updateScore(); checkWin();
      } else {
        selLeft.classList.add('wrong'); selRight.classList.add('wrong');
        const l = selLeft, r = selRight;
        setTimeout(() => { l.classList.remove('wrong', 'selected'); r.classList.remove('wrong', 'selected'); }, 500);
      }
      selLeft = null; selRight = null;
    }
  }

  function renderFlashcards(container) {
    let currentIdx = 0;
    const showCard = () => {
      const card = currentGame.items[currentIdx];
      container.innerHTML = `
        <div class="flash-scene" onclick="this.querySelector('.flash-card').classList.toggle('is-flipped')">
          <div class="flash-card">
            <div class="flash-face flash-front">
               <span class="t-xs uppercase fw-bold opacity-70 mb-4">คำถาม</span>
               <h2 class="t-subheading">${card.front}</h2>
               <p class="t-xs mt-10 opacity-60">(คลิกเพื่อดูเฉลย)</p>
            </div>
            <div class="flash-face flash-back">
               <span class="t-xs uppercase fw-bold opacity-70 mb-4">คำตอบ</span>
               <h2 class="t-body">${card.back}</h2>
            </div>
          </div>
        </div>
        <div class="flex gap-4 items-center mt-10">
          <button class="btn btn-outline" onclick="prev()" ${currentIdx===0?'disabled':''}>ก่อนหน้า</button>
          <span class="fw-bold">${currentIdx+1} / ${currentGame.items.length}</span>
          <button class="btn btn-primary" onclick="next()">${currentIdx === currentGame.items.length -1 ? 'เสร็จสิ้น' : 'ใบถัดไป'}</button>
        </div>
      `;
    };
    window.next = () => { 
      if(currentIdx < currentGame.items.length - 1) { currentIdx++; showCard(); score += 10; updateScore(); }
      else showWin();
    };
    window.prev = () => { if(currentIdx > 0) { currentIdx--; showCard(); } };
    showCard();
  }

  function renderSequence(container) {
    const items = [...currentGame.items].sort(() => Math.random() - 0.5);
    container.innerHTML = `
      <p class="t-sm t-secondary mb-8">ลากเรียงลำดับขั้นตอนให้ถูกต้อง</p>
      <div class="seq-list" id="sortList">
        ${items.map((it, i) => `<div class="seq-item" draggable="true" data-orig="${it.text}">${it.text}</div>`).join('')}
      </div>
      <button class="btn btn-primary mt-10" onclick="checkSeq()">ตรวจคำตอบ</button>
    `;
    initDragDrop();
  }

  function checkSeq() {
    const current = Array.from(document.querySelectorAll('.seq-item')).map(el => el.dataset.orig);
    const correct = currentGame.items.map(it => it.text);
    if (JSON.stringify(current) === JSON.stringify(correct)) {
      score += 100; updateScore(); showWin();
    } else {
      UI.toast("ลำดับยังไม่ถูกต้อง ลองใหม่อีกครั้งนะ!", "error");
    }
  }

  function renderSorting(container) {
    const items = [...currentGame.items].sort(() => Math.random() - 0.5);
    container.innerHTML = `
      <div class="flex flex-wrap gap-3 justify-center mb-10" id="itemsVault">
        ${items.map(it => `<div class="sort-item" draggable="true" data-group="${it.group}">${it.text}</div>`).join('')}
      </div>
      <div class="sort-bins">
        <div class="sort-bin" data-bin="A">
           <div class="w-full t-xs t-secondary fw-bold mb-2">กลุ่ม A</div>
        </div>
        <div class="sort-bin" data-bin="B">
           <div class="w-full t-xs t-secondary fw-bold mb-2">กลุ่ม B</div>
        </div>
      </div>
    `;
    initDragDrop();
  }

  function renderLogic(container) {
    let idx = 0;
    const show = () => {
      const item = currentGame.items[idx];
      container.innerHTML = `
        <div class="logic-card anim-scale-in">
          <p class="t-secondary mb-2">ข้อที่ ${idx+1} / ${currentGame.items.length}</p>
          <h2 class="t-subheading mb-10">${item.text}</h2>
          <div class="flex gap-4 justify-center">
            <button class="btn btn-success btn-lg px-10" onclick="answerLogic(true)">จริง</button>
            <button class="btn btn-error btn-lg px-10" onclick="answerLogic(false)">เท็จ</button>
          </div>
        </div>
      `;
    };
    window.answerLogic = (ans) => {
      if (ans === currentGame.items[idx].isTrue) {
        UI.toast("ถูกต้อง!", "success"); score += 20; updateScore();
        if (idx < currentGame.items.length - 1) { idx++; setTimeout(show, 500); }
        else showWin();
      } else {
        UI.toast("ยังไม่ใช่จ้า ลองคิดดูใหม่นะ", "error");
      }
    };
    show();
  }

  function initDragDrop() {
    const draggables = document.querySelectorAll('[draggable="true"]');
    const containers = document.querySelectorAll('.seq-list, .sort-bin');

    draggables.forEach(d => {
      d.addEventListener('dragstart', () => d.classList.add('dragging'));
      d.addEventListener('dragend', () => {
        d.classList.remove('dragging');
        if (currentGame.type === 'sorting') checkSortingWin();
      });
    });

    containers.forEach(c => {
      c.addEventListener('dragover', e => {
        e.preventDefault();
        const draggable = document.querySelector('.dragging');
        if (c.classList.contains('seq-list')) {
          const afterElement = getDragAfterElement(c, e.clientY);
          if (afterElement == null) c.appendChild(draggable);
          else c.insertBefore(draggable, afterElement);
        } else {
          c.classList.add('drag-over');
          c.appendChild(draggable);
        }
      });
      c.addEventListener('dragleave', () => c.classList.remove('drag-over'));
    });
  }

  function getDragAfterElement(container, y) {
    const els = [...container.querySelectorAll('.seq-item:not(.dragging)')];
    return els.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
      else return closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  function checkSortingWin() {
    const itemsInVault = document.querySelectorAll('#itemsVault .sort-item').length;
    if (itemsInVault === 0) {
      const items = document.querySelectorAll('.sort-item');
      let allCorrect = true;
      items.forEach(it => {
        const bin = it.parentElement.dataset.bin;
        if (it.dataset.group !== bin) allCorrect = false;
      });
      if (allCorrect) { score += 50; updateScore(); showWin(); }
      else UI.toast("มีบางอย่างวางผิดกลุ่มนะ!", "error");
    }
  }

  function updateScore() { document.getElementById('gameScore').textContent = score; }
  function checkWin() {
    if (currentGame.type === 'matching' && document.querySelectorAll('.match-item.correct').length === currentGame.items.length * 2) {
      showWin();
    }
  }

  function showWin() {
    document.getElementById('gameView').innerHTML = `
      <div class="t-center anim-scale-in">
        <div style="font-size:80px; margin-bottom:20px;">🎉</div>
        <h2 class="t-display t-primary-color mb-4">เก่งมากเด็กๆ!</h2>
        <p class="t-body t-secondary mb-10">เธอผ่านด่านกิจกรรมนี้เรียบร้อยแล้ว</p>
        <div class="card p-6 bg-raised mb-10">
           <div class="t-xs t-secondary uppercase fw-bold">คะแนนทั้งหมดของคุณ</div>
           <div class="t-4xl fw-bold t-primary-color">${score}</div>
        </div>
        <button class="btn btn-primary btn-lg" onclick="location.href='dashboard.html'">กลับไปหน้าหลัก</button>
      </div>
    `;
    // Optionally save grade back to server
    const urlParams = new URLSearchParams(window.location.search);
    ApiService.saveQuizGrade({
      studentId: Auth.get().id,
      lessonId: urlParams.get('lessonId'),
      score: score,
      maxScore: 100
    });
  }

  loadGame();
</script>
</body>
</html>
