<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เอกสารของฉัน — ระบบเอกสารอิเล็กทรอนิกส์</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <style>
        /* ── Slide-in Drawer ── */
        .drawer-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0); pointer-events: none;
            z-index: 400; transition: background 0.3s;
        }
        .drawer-overlay.open {
            background: rgba(15,23,42,0.35); pointer-events: auto;
        }
        .drawer {
            position: fixed; top: 0; right: -520px; width: 100%; max-width: 500px; height: 100%;
            background: var(--color-surface); border-left: 1px solid var(--color-border);
            box-shadow: -12px 0 48px rgba(0,0,0,0.12);
            z-index: 401; transition: right 0.38s cubic-bezier(0.16,1,0.3,1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .drawer.open { right: 0; }

        .drawer-header {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 20px 20px 16px; border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }
        .drawer-body { flex: 1; overflow-y: auto; padding: 20px; }
        .drawer-footer {
            padding: 16px 20px; border-top: 1px solid var(--color-border);
            display: flex; gap: 10px; flex-shrink: 0;
            background: var(--color-surface);
        }

        .drawer-doc-id { font-size: 11px; color: var(--color-text-muted); font-family: monospace; }
        .drawer-doc-title { font-size: 16px; font-weight: 800; color: var(--color-text); line-height: 1.3; flex: 1; }

        .meta-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            padding: 14px; background: var(--color-bg);
            border: 1px solid var(--color-border); border-radius: 10px;
            margin-bottom: 20px;
        }
        .meta-item-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); margin-bottom: 4px; }
        .meta-item-value { font-size: 14px; font-weight: 700; color: var(--color-text); }

        /* Timeline steps */
        .timeline { display: flex; flex-direction: column; gap: 0; }
        .timeline-step {
            display: flex; gap: 14px; padding: 10px 0;
            position: relative;
        }
        .timeline-step:not(:last-child)::after {
            content: ''; position: absolute; left: 15px; top: 38px;
            width: 2px; height: calc(100% - 14px);
            background: var(--color-border);
        }
        .timeline-dot {
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; border: 2px solid;
            position: relative; z-index: 1;
        }
        .timeline-dot.done   { background: #dcfce7; border-color: #16a34a; color: #16a34a; }
        .timeline-dot.active { background: #fff7ed; border-color: var(--color-primary); color: var(--color-primary); box-shadow: 0 0 0 4px rgba(234,88,12,0.12); }
        .timeline-dot.wait   { background: var(--color-surface); border-color: var(--color-border); color: var(--color-text-faint); }
        .timeline-content { padding-top: 4px; flex: 1; }
        .timeline-name   { font-size: 14px; font-weight: 800; color: var(--color-text); }
        .timeline-status { font-size: 12px; color: var(--color-text-muted); margin-top: 3px; font-weight: 600; }
        .timeline-comment {
            margin-top: 8px; padding: 10px 14px;
            background: #f1f5f9; border-left: 4px solid var(--color-primary-muted);
            border-radius: 0 8px 8px 0; font-size: 13px; color: var(--color-text-muted);
            font-weight: 500;
        }

        /* Filters bar */
        .my-tasks-toolbar {
            display: flex; gap: 10px; align-items: center;
            flex-wrap: wrap; margin-bottom: 16px;
        }
        .filter-chip {
            padding: 5px 14px; border-radius: 20px;
            border: 1.5px solid var(--color-border); background: var(--color-surface);
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; color: var(--color-text-muted);
            font-family: var(--font-sans);
        }
        .filter-chip.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
        .filter-chip:hover:not(.active) { border-color: var(--color-primary); color: var(--color-primary); }

        /* Table row — clickable */
        .data-table tbody tr { cursor: pointer; transition: background 0.12s; }
        .data-table tbody tr:hover td { background: var(--color-primary-light); }
        .doc-title-cell { font-weight: 600; font-size: 13px; }
        .doc-title-cell:hover { color: var(--color-primary); }
    </style>
</head>
<body data-page-id="myTasks">
<div class="app-wrapper">
    <div id="sidebar-container" class="app-sidebar"></div>
    <div class="app-main">
        <header id="navbar-container" class="app-navbar"></header>
        <main class="app-content">
            <div class="container-lg">

                <div class="page-header">
                    <div class="page-header-left">
                        <h1>เอกสารของฉัน</h1>
                        <p>ติดตามสถานะเอกสารทั้งหมดที่คุณนำเข้าระบบ — คลิกแถวเพื่อดูรายละเอียด</p>
                    </div>
                    <a href="submitDoc.html" class="btn btn-primary btn-sm">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
                        สร้างเอกสารใหม่
                    </a>
                </div>

                <!-- Filter chips + search -->
                <div class="my-tasks-toolbar anim-fade-up">
                    <button class="filter-chip active" onclick="setFilter('all',this)">ทั้งหมด</button>
                    <button class="filter-chip" onclick="setFilter('pending',this)">⏳ รอพิจารณา</button>
                    <button class="filter-chip" onclick="setFilter('approved',this)">✅ อนุมัติแล้ว</button>
                    <button class="filter-chip" onclick="setFilter('rejected',this)">↩️ ถูกตีกลับ</button>
                    <div style="flex:1;"></div>
                    <div style="position:relative;display:flex;align-items:center;">
                        <svg style="position:absolute;left:10px;pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        <input type="text" id="search-input" class="form-input" oninput="renderTable()" placeholder="ค้นหาหัวเรื่อง..." style="padding-left:32px;width:220px;font-size:13px;">
                    </div>
                </div>

                <div class="card p-0 anim-fade-up anim-stagger-1">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>รหัส</th>
                                    <th>หัวเรื่อง</th>
                                    <th>ผู้พิจารณาต่อไป</th>
                                    <th>วันที่ส่ง</th>
                                    <th>สถานะ</th>
                                </tr>
                            </thead>
                            <tbody id="tasks-tbody">
                                <tr><td colspan="5"><div class="skeleton skeleton-row" style="border-radius:0;"></div></td></tr>
                                <tr><td colspan="5"><div class="skeleton skeleton-row" style="border-radius:0;animation-delay:0.12s"></div></td></tr>
                                <tr><td colspan="5"><div class="skeleton skeleton-row" style="border-radius:0;animation-delay:0.24s"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<!-- ══ Slide-in Detail Drawer ══ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="doc-drawer">
    <div class="drawer-header">
        <div style="flex:1;min-width:0;">
            <div class="drawer-doc-id" id="drawer-doc-id">—</div>
            <div class="drawer-doc-title" id="drawer-doc-title">กำลังโหลด...</div>
            <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;" id="drawer-badges"></div>
        </div>
        <button class="btn-icon" onclick="closeDrawer()" title="ปิด">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>

    <div class="drawer-body" id="drawer-body">
        <!-- ข้อมูลเมตา -->
        <div class="meta-grid" id="drawer-meta"></div>

        <!-- Timeline -->
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--color-text-faint);margin-bottom:12px;">สายงานการพิจารณา</div>
        <div class="timeline" id="drawer-timeline"></div>

        <!-- Description -->
        <div id="drawer-desc-section" style="margin-top:20px;display:none;">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--color-text-faint);margin-bottom:8px;">รายละเอียด</div>
            <div id="drawer-desc" style="font-size:13px;line-height:1.7;color:var(--color-text-muted);background:var(--color-bg);border:1px solid var(--color-border);border-radius:8px;padding:12px 14px;"></div>
        </div>
    </div>

    <div class="drawer-footer" id="drawer-footer">
        <button class="btn btn-secondary btn-sm" onclick="closeDrawer()">ปิด</button>
    </div>
</div>

<script src="core.js"></script>
<script>
const docTypeLabels = {
    finance:'การเงิน/พัสดุ', academic:'วิชาการ', hr:'บุคลากร',
    project:'โครงการ', travel:'เดินทางราชการ', general:'ทั่วไป',
};
const badgeMap = {
    pending: '<span class="badge badge-orange">⏳ รอพิจารณา</span>',
    approved:'<span class="badge badge-green">✅ อนุมัติแล้ว</span>',
    rejected:'<span class="badge badge-red">↩️ ถูกตีกลับ</span>',
};

let allDocs = [];
let activeFilter = 'all';

async function init() {
    try {
        const res = await API.getRecentDocuments();
        if (res && res.status === 'error') throw new Error(res.message);
        allDocs = Array.isArray(res) ? res : [];
        renderTable();
    } catch(e) {
        console.error(e);
        UI.showToast('ไม่สามารถโหลดข้อมูลได้', 'error');
    }
}

function setFilter(status, btn) {
    activeFilter = status;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
}

function renderTable() {
    const q = (document.getElementById('search-input').value || '').toLowerCase();
    let docs = allDocs;
    if (activeFilter !== 'all') docs = docs.filter(d => d.status === activeFilter);
    if (q) docs = docs.filter(d => d.title.toLowerCase().includes(q) || d.id.toLowerCase().includes(q));

    const tbody = document.getElementById('tasks-tbody');
    if (docs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5">
            <div class="empty-state">
                <div class="empty-state-icon">📄</div>
                <div class="empty-state-title">ไม่พบเอกสาร</div>
                <div class="empty-state-desc">ไม่มีเอกสารในสถานะนี้ หรือลองค้นหาด้วยคำอื่น</div>
            </div>
        </td></tr>`;
        return;
    }
    tbody.innerHTML = docs.map(doc => {
        const nextStep = doc.workflowSteps?.[doc.currentStepIndex];
        return `
        <tr onclick="openDrawer('${doc.id}')">
            <td class="mono fw-600" style="font-size:12px;color:var(--color-text-muted);">${doc.id}</td>
            <td>
                <div class="doc-title-cell">${doc.title.length > 50 ? doc.title.substring(0,50)+'…' : doc.title}</div>
                <div style="display:flex;gap:4px;margin-top:4px;">
                    <span class="badge badge-gray" style="font-size:10px;">${docTypeLabels[doc.docType]||doc.docType}</span>
                    ${doc.isUrgent?'<span class="badge badge-red" style="font-size:10px;">ด่วน</span>':''}
                </div>
            </td>
            <td class="text-muted text-sm">${nextStep ? nextStep.title : '—'}</td>
            <td class="text-muted text-sm">${doc.submittedDate||doc.date||'—'}</td>
            <td>${badgeMap[doc.status]||doc.status}</td>
        </tr>`;
    }).join('');
}

/* ── Drawer ── */
function openDrawer(docId) {
    const doc = WorkflowEngine.getById(docId);
    if (!doc) return;

    document.getElementById('drawer-doc-id').textContent = doc.id;
    document.getElementById('drawer-doc-title').textContent = doc.title;
    document.getElementById('drawer-badges').innerHTML =
        `<span class="badge badge-gray">${docTypeLabels[doc.docType]||doc.docType}</span>` +
        (doc.isUrgent ? '<span class="badge badge-red">ด่วน ⚡</span>' : '') +
        (badgeMap[doc.status]||'');

    document.getElementById('drawer-meta').innerHTML = `
        <div><div class="meta-item-label">ผู้ยื่น</div><div class="meta-item-value">${doc.senderName}</div></div>
        <div><div class="meta-item-label">วันที่ยื่น</div><div class="meta-item-value">${doc.submittedDate||doc.date||'—'}</div></div>
        <div><div class="meta-item-label">ขั้นตอนปัจจุบัน</div><div class="meta-item-value">${doc.currentStepIndex+1} / ${doc.workflowSteps?.length||'—'}</div></div>
        <div><div class="meta-item-label">สถานะ</div><div class="meta-item-value">${badgeMap[doc.status]||doc.status}</div></div>`;

    // Animated timeline
    const steps = doc.workflowSteps || [];
    document.getElementById('drawer-timeline').innerHTML = steps.map((step, i) => {
        const isDone   = i < doc.currentStepIndex || doc.status === 'approved';
        const isActive = i === doc.currentStepIndex && doc.status === 'pending';
        const dotClass = isDone ? 'done' : isActive ? 'active' : 'wait';
        const icon = isDone
            ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>`
            : isActive ? '⌛' : i+1;
        const statusText = isDone ? 'อนุมัติแล้ว' : isActive ? 'รออยู่ระหว่างพิจารณา' : 'รอดำเนินการ';
        
        // Handle step as object or string
        const stepTitle = (typeof step === 'object' ? step.title : step) || '—';

        return `
        <div class="timeline-step">
            <div class="timeline-dot ${dotClass}">${icon}</div>
            <div class="timeline-content">
                <div class="timeline-name">${stepTitle}</div>
                <div class="timeline-status">${statusText}</div>
                ${step.comment ? `<div class="timeline-comment">"${step.comment}"</div>` : ''}
            </div>
        </div>`;
    }).join('');

    if (doc.status === 'rejected' && doc.rejectedReason) {
        document.getElementById('drawer-desc-section').style.display = '';
        document.getElementById('drawer-desc').innerHTML =
            `<strong style="color:var(--color-danger);">เหตุผลที่ตีกลับ:</strong><br>${doc.rejectedReason}`;
    } else if (doc.description) {
        document.getElementById('drawer-desc-section').style.display = '';
        document.getElementById('drawer-desc').textContent = doc.description;
    } else {
        document.getElementById('drawer-desc-section').style.display = 'none';
    }

    document.getElementById('drawer-footer').innerHTML = `
        <button class="btn btn-secondary btn-sm flex-1" onclick="closeDrawer()">ปิด</button>
        ${doc.status==='pending'?`<a href="approval.html" class="btn btn-primary btn-sm flex-1">ไปยังหน้าพิจารณา →</a>`:''}`;

    document.getElementById('drawer-overlay').classList.add('open');
    document.getElementById('doc-drawer').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeDrawer() {
    document.getElementById('drawer-overlay').classList.remove('open');
    document.getElementById('doc-drawer').classList.remove('open');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
