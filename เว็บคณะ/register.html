<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนบุคลากร — ระบบเอกสารอิเล็กทรอนิกส์</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <!-- SweetAlert2 for Premium Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .login-card { width: 100%; max-width: 520px; padding: 40px; }
        .logo-box { width: 64px; height: 64px; margin: 0 auto 24px; background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 44px; height: 44px; object-fit: contain; }
    </style>
</head>
<body data-page-id="auth">
    <div class="auth-layout">
        <div class="card login-card">
            
            <div class="logo-box">
                <img src="logo.png" alt="ตรามหาวิทยาลัยนครพนม" onerror="this.style.display='none'">
            </div>
            
            <div class="text-center mb-6">
                <h1 style="font-size: 20px; margin-bottom: 6px;">ลงทะเบียนบุคลากรใหม่</h1>
                <p class="text-muted" style="font-size: 13px;">ขอสิทธิ์เข้าใช้งานระบบสารสนเทศคณะครุศาสตร์</p>
            </div>

            <form id="register-form">
                <div class="flex gap-4 mb-4">
                    <div class="form-group w-full m-0">
                        <label class="form-label" for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" class="form-input" required>
                    </div>
                    <div class="form-group w-full m-0">
                        <label class="form-label" for="email">อีเมลองค์กร</label>
                        <input type="email" id="email" class="form-input" placeholder="@npu.ac.th" required>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label" for="group">เลือกสังกัด/ฝ่ายหลัก</label>
                    <select id="group" class="form-input" required onchange="updateSections()">
                        <option value="" disabled selected>-- เลือกสังกัดหลัก --</option>
                    </select>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label" for="dept">เลือกงานย่อยที่ท่านปฏิบัติหน้าที่</label>
                    <select id="dept" class="form-input" required disabled>
                        <option value="" disabled selected>-- เลือกงานฝ่าย --</option>
                    </select>
                </div>

                <div class="flex gap-4 mb-6">
                    <div class="form-group w-full m-0">
                        <label class="form-label" for="password">รหัสผ่านใหม่</label>
                        <input type="password" id="password" class="form-input" required>
                    </div>
                    <div class="form-group w-full m-0">
                        <label class="form-label" for="confirm_pwd">ยืนยันรหัสผ่าน</label>
                        <input type="password" id="confirm_pwd" class="form-input" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-register">สร้างบัญชีผู้ใช้งาน</button>
            </form>

            <div class="text-center mt-6" style="border-top: 1px solid var(--color-border); padding-top: 24px;">
                <span class="text-muted" style="font-size: 13px;">มีบัญชีผู้ใช้งานแล้วใช่หรือไม่? </span>
                <a href="index.html" style="font-size: 13px; font-weight: 600;">กลับไปหน้าล็อกอิน</a>
            </div>

        </div>
    </div>

    <!-- JS Architecture -->
    <script src="core.js"></script>

    <script>
        // Initialize Groups from core.js
        function initGroups() {
            const groupSelect = document.getElementById('group');
            mockDepartments.forEach(dept => {
                const opt = document.createElement('option');
                opt.value = dept.value;
                opt.textContent = dept.label;
                groupSelect.appendChild(opt);
            });
        }

        function updateSections() {
            const groupVal = document.getElementById('group').value;
            const deptSelect = document.getElementById('dept');
            const groupData = mockDepartments.find(d => d.value === groupVal);
            
            deptSelect.innerHTML = '<option value="" disabled selected>-- เลือกงานฝ่าย --</option>';
            if (groupData && groupData.options) {
                groupData.options.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt.label; // Store label as value for the spreadsheet
                    o.textContent = opt.label;
                    deptSelect.appendChild(o);
                });
                deptSelect.disabled = false;
            } else {
                deptSelect.disabled = true;
            }
        }

        initGroups();

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const fullName = document.getElementById('fullname').value.trim();
            const groupSelect = document.getElementById('group');
            const groupLabel = groupSelect.options[groupSelect.selectedIndex].text;
            const department = document.getElementById('dept').value; // Sub-topic label
            const password = document.getElementById('password').value.trim();
            const confirmPwd = document.getElementById('confirm_pwd').value.trim();

            // Password Validation
            if (password !== confirmPwd) {
                Swal.fire({ icon: 'warning', title: 'รหัสผ่านไม่ตรงกัน', text: 'กรุณาตรวจสอบรหัสผ่านอีกครั้งครับ', confirmButtonColor: '#ea580c' });
                return;
            }

            const btn = document.getElementById('btn-register');
            btn.disabled = true;
            btn.textContent = 'กำลังสร้างบัญชี...';

            try {
                const response = await API.registerUser({
                    email,
                    fullName,
                    group: groupLabel,
                    department: groupLabel, // Map Main Dept to Department column
                    position: department,   // Map Sub Dept to Position column
                    password
                });

                if (response.status === 'success') {
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'ลงทะเบียนสำเร็จ!', 
                        text: 'ยินดีต้อนรับสู่ระบบ คณะครุศาสตร์ ม.นครพนม',
                        timer: 2000, 
                        showConfirmButton: false 
                    });
                    setTimeout(() => window.location.href = 'index.html', 2200);
                } else {
                    Swal.fire({ icon: 'error', title: 'ลงทะเบียนล้มเหลว', text: response.message || 'เกิดข้อผิดพลาดบางอย่าง', confirmButtonColor: '#ea580c' });
                }
            } catch (error) {
                console.error('Error during registration:', error);
                Swal.fire({ icon: 'error', title: 'การเชื่อมต่อขัดข้อง', text: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ในขณะนี้', confirmButtonColor: '#ea580c' });
            } finally {
                btn.disabled = false;
                btn.textContent = 'สร้างบัญชีผู้ใช้งาน';
            }
        });
    </script>
</body>
</html>
