<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โจทย์ปัญหา | KIDDO LEARNING</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body style="background:var(--bg-app);">
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">
      <div class="sidebar-logo-icon"><span data-icon="monitor"></span></div>
      <div class="sidebar-logo-text">KIDDO<span data-bind="gradeLabel">วิทยาการคำนวณ</span></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Learning Menu</div>
      <a href="dashboard.html" class="sidebar-nav-item"><span class="nav-icon" data-icon="home"></span>หน้าหลัก</a>
      <a href="lessons-list.html" class="sidebar-nav-item"><span class="nav-icon" data-icon="book"></span>เนื้อหาบทเรียน</a>
      <a href="quiz-list.html" class="sidebar-nav-item active"><span class="nav-icon" data-icon="task"></span>โจทย์ปัญหา</a>
      <a href="assignments.html" class="sidebar-nav-item"><span class="nav-icon" data-icon="upload"></span>แบบฝึกหัด</a>
      <a href="report.html" class="sidebar-nav-item"><span class="nav-icon" data-icon="chart"></span>สมุดพก</a>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" data-user="avatar" style="background: var(--grad-primary); color: white; border: none;">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" data-user="name">...</div>
          <div class="sidebar-user-role" data-user="role">นักเรียน</div>
        </div>
        <button data-action="logout" class="btn-logout" title="ออกจากระบบ">
          <span data-icon="logout"></span>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="page-header animate-in">
      <div>
        <h1 class="t-display" style="font-size: 2.441rem;">โจทย์ปัญหา</h1>
        <p class="t-body">ทดสอบทักษะของคุณผ่านภารกิจสุดท้าทายที่คุณครูเตรียมไว้ให้!</p>
      </div>
    </header>

    <div class="page-body">
      <div class="animate-in">
        <div class="flex items-center justify-between mb-8">
          <div class="flex items-center gap-4">
            <div class="badge badge-primary" style="padding: 6px 16px;">🔥 ภารกิจใหม่</div>
            <h2 class="t-title" style="font-size: 1.5rem;">โจทย์ปัญหาทั้งหมด</h2>
          </div>
          <div class="t-xs fw-bold t-secondary" id="quizCount">กำลังโหลด...</div>
        </div>
        
        <div id="quizContainer" class="grid-auto">
            <div class="p-16 t-center">
              <div class="spinner" style="margin: 0 auto;"></div>
              <p class="t-body mt-6">กำลังเตรียมภารกิจสุดพิเศษให้คุณ...</p>
            </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  async function initQuizzes() {
    const user = Auth.requireAuth();
    if (!user) return;

    // Update sidebar grade label
    const gradeLabel = document.querySelector('[data-bind="gradeLabel"]');
    if (gradeLabel && user.grade) {
      gradeLabel.textContent = `วิทยาการคำนวณ ${user.grade}`;
    }
    
    try {
      const urlParams = new URLSearchParams(window.location.search);
      const filterId = urlParams.get('id'); // รับรหัสบทเรียนเพื่อกรองอัตโนมัติ

      const [qRes, lRes] = await Promise.all([
        ApiService.getQuizzes(null, user.grade), 
        ApiService.getLessons(user.grade)
      ]);
      
      // ตรวจสอบแต่ละ response แยกกัน (ไม่ให้พังทั้งหมดถ้าผิดแค่อันเดียว)
      if (qRes.status !== 'success') {
        console.error('Quiz API Error:', qRes.message);
        document.getElementById('quizContainer').innerHTML = `<div class="card p-12 t-center"><div class="t-secondary mb-4">ไม่สามารถโหลดโจทย์ปัญหาได้</div><p class="t-xs t-secondary">${qRes.message || 'กรุณาลองรีเฟรชหน้าเว็บ'}</p><button onclick="location.reload()" class="btn btn-outline btn-sm mt-4">ลองใหม่</button></div>`;
        return;
      }

      const lessons = (lRes.status === 'success') ? lRes.data : [];
      let quizzes = qRes.data;


        // ถ้ามีรหัสบทเรียนส่งมา ให้กรองเหลือแค่โจทย์ของบทนั้น
        if (filterId) {
          quizzes = quizzes.filter(q => String(q.LessonID) === String(filterId));
        }

        const container = document.getElementById('quizContainer');
        const countDisplay = document.getElementById('quizCount');
        if (countDisplay) countDisplay.textContent = `พบ ${quizzes.length} รายการ`;

        if (quizzes.length === 0) {
          container.innerHTML = `
            <div class="card p-16 t-center animate-in" style="grid-column: 1/-1; border: 2px dashed var(--border-subtle); background: transparent; box-shadow: none;">
              <div class="avatar mb-6" style="margin:0 auto; width:80px; height:80px; background:var(--neutral-100); color:var(--neutral-400); border:none; border-radius: 24px;">
                <span data-icon="task" style="width:40px; height:40px;"></span>
              </div>
              <h3 class="t-title mb-4" style="font-size: 1.5rem;">ยังไม่มีโจทย์ปัญหา</h3>
              <p class="t-body">${filterId ? 'ยังไม่มีโจทย์สำหรับบทเรียนนี้' : 'ยังไม่มีโจทย์ปัญหาสำหรับชั้นของคุณในขณะนี้'}</p>
              <a href="dashboard.html" class="btn btn-outline mt-8" style="border-radius: var(--radius-full);">กลับไปหน้าหลัก</a>
            </div>
          `;
          if (window.app && window.app.initIcons) window.app.initIcons();
          return;
        }

        container.innerHTML = quizzes.map((quiz, idx) => {
          const lesson = lessons.find(l => String(l.ID) === String(quiz.LessonID));
          let lessonInfo = 'ภารกิจทั่วไป';
          if (lesson) {
            lessonInfo = lesson.Category ? `${lesson.Category} : ${lesson.Title}` : lesson.Title;
          }
          
          let rawUrl = String(quiz.QuizURL || quiz['Quiz URL'] || quiz.Link || '').trim();
          const pointsStr = String(quiz.Points || '').trim();
          
          if (!rawUrl.includes('http') && pointsStr.includes('http')) {
             rawUrl = pointsStr;
          }

          const urlStr = rawUrl.toLowerCase();
          const isExternal = urlStr.includes('http');
          const finalLink = isExternal ? rawUrl : `play-problem.html?id=${quiz.LessonID}`;
          const target = isExternal ? '_blank' : '_self';
          
          const lessonVideo = lesson ? lesson.VideoURL : '';
          const hasVideo = lessonVideo && lessonVideo.includes('http');

          return `
            <div class="card flex flex-col animate-in" style="animation-delay: ${idx * 100}ms;">
              <div class="flex items-center gap-5 mb-6">
                <div class="avatar" style="background:var(--color-amber-50); color:var(--color-amber-500); border:none; border-radius: 12px; width: 48px; height: 48px;">
                  <span data-icon="task"></span>
                </div>
                <div class="flex-1">
                  <div class="fw-bold" style="font-size: 1rem; color: var(--neutral-900); line-height: 1.4;">${quiz.Title}</div>
                  <div class="t-xs mt-1" style="color: var(--text-secondary); font-weight: 600;">${lessonInfo}</div>
                </div>
              </div>
              
              <div class="flex-1">
                 <p class="t-body mb-8" style="font-size: 0.9rem; line-height: 1.6;">
                   ${isExternal ? 'แบบทดสอบผ่านเครื่องมือภายนอก' : 'ภารกิจลับในระบบ KIDDO'} พร้อมแล้วที่จะให้คุณมาพิชิตคะแนนเต็ม!
                 </p>
              </div>
              
              <div class="flex flex-col gap-3">
                ${hasVideo ? `
                  <a href="${lessonVideo}" target="_blank" class="btn btn-outline btn-block" style="border-color:var(--color-primary-100); color:var(--color-primary-600); border-radius: var(--radius-lg); height: 48px; font-weight: 800;">
                    <span data-icon="video" style="margin-right: 8px;"></span> ทบทวนบทเรียน
                  </a>
                ` : ''}
                <a href="${finalLink}" target="${target}" class="btn btn-primary btn-block" style="border-radius: var(--radius-lg); height: 48px; font-weight: 800;">
                  เริ่มทำโจทย์ <span data-icon="arrow-right" style="margin-left: 8px;"></span>
                </a>
              </div>
            </div>
          `;
        }).join('');

        
        if (window.app && window.app.initIcons) window.app.initIcons();

    } catch (err) {
      console.error("Quiz error:", err);
      document.getElementById('quizContainer').innerHTML = `
        <div class="card p-12 t-center" style="grid-column: 1/-1;">
          <div class="t-secondary mb-4">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>
          <p class="t-xs t-secondary">${err.message || 'กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต'}</p>
          <button onclick="location.reload()" class="btn btn-outline btn-sm mt-4">ลองใหม่</button>
        </div>`;
    }
  }

  initQuizzes();
</script>
</body>
</html>
