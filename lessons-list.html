<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บทเรียน | KIDDO LEARNING</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* Accordion Styles */
    .chapter-card {
      background: white;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-subtle);
      margin-bottom: var(--sp-4);
      overflow: hidden;
      transition: all 0.3s var(--ease-premium);
    }
    .chapter-header {
      padding: var(--sp-6) var(--sp-8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .chapter-header:hover { background: var(--neutral-50); }
    .chapter-header .chevron {
      transition: transform 0.3s ease;
    }
    .chapter-card.active {
      border-color: var(--color-primary-200);
      box-shadow: var(--shadow-md);
    }
    .chapter-card.active .chapter-header {
      border-bottom: 1px solid var(--border-subtle);
      background: var(--color-primary-50);
    }
    .chapter-card.active .chevron { transform: rotate(180deg); }

    .lesson-list {
      display: none;
      flex-direction: column;
      background: white;
    }
    .chapter-card.active .lesson-list { display: flex; }

    .lesson-item {
      padding: var(--sp-5) var(--sp-8);
      display: flex;
      align-items: center;
      gap: var(--sp-6);
      border-bottom: 1px solid var(--neutral-50);
      transition: background 0.2s ease;
      text-decoration: none;
      color: inherit;
    }
    .lesson-item:last-child { border-bottom: none; }
    .lesson-item:hover { background: var(--neutral-50); }
    
    .lesson-icon {
      width: 42px; height: 42px;
      border-radius: var(--radius-md);
      background: var(--neutral-100);
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .lesson-item:hover .lesson-icon {
      background: var(--color-primary-500);
      color: white;
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><span data-icon="monitor"></span></div>
      <div class="sidebar-logo-text">KIDDO<span data-bind="gradeLabel">วิทยาการคำนวณ</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Learning Menu</div>
      <a href="dashboard.html" class="sidebar-nav-item"><span class="nav-icon" data-icon="home"></span>หน้าหลัก</a>
      <a href="lessons-list.html" class="sidebar-nav-item active"><span class="nav-icon" data-icon="book"></span>เนื้อหาบทเรียน</a>
      <a href="quiz-list.html" class="sidebar-nav-item"><span class="nav-icon" data-icon="task"></span>โจทย์ปัญหา</a>
      <a href="assignments.html" class="sidebar-nav-item"><span class="nav-icon" data-icon="upload"></span>แบบฝึกหัด</a>
      <a href="report.html" class="sidebar-nav-item"><span class="nav-icon" data-icon="chart"></span>สมุดพก</a>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" data-user="avatar" style="background: var(--grad-primary); color: white; border: none;">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" data-user="name">...</div>
          <div class="sidebar-user-role" data-user="role">นักเรียน</div>
        </div>
        <button data-action="logout" class="btn-logout" title="ออกจากระบบ">
          <span data-icon="logout"></span>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="page-header animate-in">
      <div>
        <h1 class="t-display" style="font-size: 2.441rem;">บทเรียนทั้งหมด</h1>
        <p class="t-body">เลือกหน่วยการเรียนรู้ที่คุณสนใจด้านล่างนี้ได้เลยครับ</p>
      </div>
    </header>

    <div class="page-body">
      <div id="chaptersContainer" class="flex flex-col gap-2">
        <!-- Chapters will be injected here -->
        <div class="p-16 t-center">
          <div class="spinner" style="margin: 0 auto;"></div>
          <p class="t-body mt-6">กำลังเตรียมสื่อการสอนที่พรีเมียมให้คุณ...</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  async function initLessons() {
    const user = Auth.requireAuth();
    if (!user) return;

    // Update sidebar grade label
    const gradeLabel = document.querySelector('[data-bind="gradeLabel"]');
    if (gradeLabel && user.grade) {
      gradeLabel.textContent = `วิทยาการคำนวณ ${user.grade}`;
    }

    // Pass student's grade for server-side filtering
    const userGrade = (user.role === 'user' && user.grade) ? user.grade : null;

    try {
      const res = await ApiService.getLessons(userGrade);
      const container = document.getElementById('chaptersContainer');
      
        if (res.status === 'success') {
        const lessons = res.data;
        if (!lessons || lessons.length === 0) {
          container.innerHTML = `
            <div class="card p-16 t-center animate-in">
              <div class="avatar mb-6" style="margin:0 auto; width:80px; height:80px; background:var(--neutral-100); color:var(--neutral-400); border:none; border-radius: 24px;">
                <span data-icon="bookOpen" style="width:40px; height:40px;"></span>
              </div>
              <h3 class="t-title mb-4" style="font-size: 1.5rem;">ยังไม่มีบทเรียนในชั้นนี้</h3>
              <p class="t-body">คุณครูยังไม่ได้เพิ่มบทเรียนสำหรับชั้น ${user.grade || ''} <br>ลองกลับมาดูใหม่อีกครั้งในภายหลังนะครับ</p>
              <a href="dashboard.html" class="btn btn-outline mt-8" style="border-radius: var(--radius-full);">กลับไปหน้าหลัก</a>
            </div>
          `;
          if (window.app && window.app.initIcons) window.app.initIcons();
          return;
        }
        // Group by Category
        const categories = [];
        lessons.forEach(l => {
          const cat = (l.Category || 'ทั่วไป').trim();
          if (!categories.includes(cat)) categories.push(cat);
        });
        
        container.innerHTML = categories.map((name, idx) => {
          const chapterLessons = lessons.filter(l => (l.Category || 'ทั่วไป').trim() === name);
          
          let displayTitle = name;
          if (!name.includes('บทที่') && name !== 'ทั่วไป' && name !== 'บทนำ') {
            displayTitle = `บทที่ ${idx + 1}: ${name}`;
          } else if (name === 'ทั่วไป' || name === 'บทนำ') {
            displayTitle = `บทเรียนเสริม/ทั่วไป`;
          }
          
          return `
            <div class="chapter-card animate-in" id="chap-${idx}" style="animation-delay: ${idx * 100}ms;">
              <div class="chapter-header" onclick="toggleChapter(${idx})">
                <div class="flex items-center gap-6">
                  <div class="avatar" style="background:var(--color-primary-50); color:var(--color-primary-600); font-weight:800; border-radius: 12px; width: 48px; height: 48px; border: none;">${idx + 1}</div>
                  <div>
                    <div class="t-title" style="font-size: 1.25rem;">${displayTitle}</div>
                    <div class="t-xs mt-1" style="color: var(--text-secondary); font-weight: 600;">${chapterLessons.length} บทเรียนย่อยในหน่วยนี้</div>
                  </div>
                </div>
                <div class="chevron" style="color: var(--neutral-300);"><span data-icon="chevron-down"></span></div>
              </div>
              <div class="lesson-list" style="padding: 0 var(--sp-4) var(--sp-4);">
                ${chapterLessons.map(lesson => `
                  <a href="play-lesson.html?id=${lesson.ID}" class="lesson-item" style="border-radius: var(--radius-lg); border-bottom: none; margin-bottom: 4px; padding: var(--sp-4) var(--sp-6);">
                    <div class="lesson-icon" style="background: var(--neutral-50); border-radius: 10px;">
                      <span data-icon="${lesson.Type === 'video' ? 'play' : 'book'}"></span>
                    </div>
                    <div class="flex-1">
                      <div class="fw-bold" style="font-size: 0.9375rem; color: var(--neutral-900);">${lesson.Title}</div>
                      <div class="t-xs" style="color: var(--text-secondary); font-weight: 600; margin-top: 2px;">${lesson.Category || 'เนื้อหาเรียนรู้'}</div>
                    </div>
                    <div class="btn btn-outline btn-sm" style="border-radius: var(--radius-full); font-weight: 800; padding: 0 16px;">เริ่มเรียน</div>
                  </a>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');

        
        if (window.app && window.app.initIcons) window.app.initIcons();
        
        // Auto-open first chapter
        if (categories.length > 0) toggleChapter(0);
      }
    } catch (err) {
      console.error("Lessons list error:", err);
    }
  }

  function toggleChapter(idx) {
    const card = document.getElementById(`chap-${idx}`);
    if (card) {
      card.classList.toggle('active');
    }
  }

  initLessons();
</script>
</body>
</html>
