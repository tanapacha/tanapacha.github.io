<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aura LifeOS | Timetable</title>
    <meta name="description" content="Aura LifeOS — ตารางสอน">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aura LifeOS">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#050608">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        tailwind.config={theme:{extend:{colors:{gold:'var(--aura-primary)',midnight:'#050608',secondary:'rgba(255,255,255,0.4)'}}}};
        const applyTheme=()=>{const h=new Date().getHours(),r=document.documentElement;if(h>=6&&h<12){r.style.setProperty('--aura-primary','oklch(80% 0.15 85)');r.style.setProperty('--aura-glow','rgba(212,175,55,0.25)')}else if(h>=12&&h<17){r.style.setProperty('--aura-primary','oklch(78% 0.15 200)');r.style.setProperty('--aura-glow','rgba(55,180,212,0.25)')}else{r.style.setProperty('--aura-primary','oklch(70% 0.22 300)');r.style.setProperty('--aura-glow','rgba(167,139,250,0.25)')}};applyTheme();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="js/api/api-client.js?v=6"></script>
    <script type="text/babel" src="js/components/Navbar.js?v=6"></script>
    <script type="text/babel" src="js/components/BentoCard.js?v=6"></script>
    <script type="text/babel" src="js/pages/timetable.js?v=6"></script>
    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'))}</script>
</body>
</html>
