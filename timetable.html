<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura LifeOS | ตารางจัดการการสอน</title>
    
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#D4AF37">
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        midnight: '#0A0C10',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <!-- Scripts -->
    <script src="js/api/api-client.js"></script>
    <script type="text/babel" src="js/components/Navbar.js"></script>
    <script type="text/babel" src="js/components/BentoCard.js"></script>
    <script type="text/babel" src="js/pages/timetable.js"></script>
    
    <script type="text/babel">
        // Global Scroll Effect
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 20) {
                nav?.classList.add('glass-active');
            } else {
                nav?.classList.remove('glass-active');
            }
        });
    </script>
</body>
</html>
