<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบบริหารจัดการพัสดุ | เบิกพัสดุ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-bar {
            position: fixed; bottom: 20px; right: 20px; width: 300px; 
            background: var(--brand-primary); color: white; display: none;
            padding: 15px; border: 2px solid white; box-shadow: var(--shadow-lg); cursor: pointer;
        }
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal-content { 
            background: white; width: 450px; padding: 25px; border-radius: 4px; 
            border: 2px solid #000; box-shadow: var(--shadow-lg); 
        }
        .qty-control { display: flex; align-items: center; gap: 5px; border: 1px solid #ddd; max-width: 100px; }
        .qty-control button { border: none; background: #eee; padding: 5px 10px; cursor: pointer; }
        .qty-control input { border: none; text-align: center; width: 40px; background: transparent; }
    </style>
</head>
<body>
    <div class="mpg-app">
        <div class="mpg-sidebar">
            <div class="sidebar-header"><i class="fas fa-box-open" style="color: gold;"></i> SMART SCHOOL</div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-th-large"></i> หน้าหลัก
                </a>
                <a href="borrow.html" class="nav-item active">
                    <i class="fas fa-cart-plus"></i> เบิกพัสดุ
                </a>
                <a href="return.html" class="nav-item">
                    <i class="fas fa-undo"></i> คืนพัสดุ
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fas fa-search-plus"></i> คลังพัสดุ
                </a>
                <a href="summary.html" class="nav-item">
                    <i class="fas fa-list-alt"></i> รายงานสรุป
                </a>
                <div id="adminLinkPlaceholder"></div>
            </div>
        </div>

        <div class="mpg-main">
            <div class="top-bar">
                <div style="font-weight: 700;">สร้างใบเบิกพัสดุ (New Requisition)</div>
                <div id="userNameDisplay">...</div>
            </div>

            <div class="content-body">
                <div class="mpg-card">
                    <div style="background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--mpg-border);">
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <div style="position: relative;">
                                <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                                <input type="text" id="searchInput" oninput="renderInventory()" placeholder="ค้นหารหัส หรือ ชื่อพัสดุ..." style="padding-left: 45px; border-radius: 10px; height: 45px; border: 1px solid var(--mpg-border);">
                            </div>
                            <div id="categoryFilters" style="display: flex; gap: 8px; flex-wrap: wrap;">
                                <button class="btn active" onclick="filterCategory('ทั้งหมด')" style="border-radius: 20px;">ทั้งหมด</button>
                            </div>
                        </div>
                    </div>

                    <table class="mpg-table">
                        <thead>
                            <tr>
                                <th>ชื่อรายการพัสดุ</th>
                                <th>หมวดหมู่</th>
                                <th style="text-align: center;">คงเหลือ</th>
                                <th style="width: 120px;">จำนวน</th>
                                <th style="text-align: right;">การกระทำ</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTbody">
                            <tr><td colspan="5" style="text-align: center; padding: 40px;">กำลังโหลด...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="cartBar" class="cart-bar" onclick="openCartModal()">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div><i class="fas fa-shopping-cart"></i> <strong>ตะกร้าเบิกพัสดุ</strong></div>
            <span id="cartCount" style="background: red; padding: 2px 8px; font-weight: 800;">0</span>
        </div>
        <div id="cartHint" style="font-size: 11px; margin-top: 5px; opacity: 0.8;">คลิกเพื่อยืนยันรายการ</div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div style="font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">ยืนยันคำขอเบิกพัสดุ</div>
            <div id="cartItemList" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-size: 0.8rem; font-weight: 700;">เหตุผลการเบิก</label>
                <input type="text" id="borrowReason" placeholder="ระบุเหตุผล เช่น ใช้ในการเรียนการสอน">
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-size: 0.8rem; font-weight: 700;">ระยะยืม (วัน)</label>
                <select id="borrowDuration">
                    <option value="1">1 วัน</option>
                    <option value="3">3 วัน</option>
                    <option value="7" selected>7 วัน</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" id="btnSubmit" onclick="submitBorrow()" style="flex: 2;">ส่งคำขอเบิกพัสดุ</button>
                <button class="btn" onclick="closeCartModal()" style="flex: 1;">ปิด</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxgR3YK2xU4aXjI4DgSk9eny_V2gZYvvLzPfpWq6IhC4BDuBR5IO_QNOHR4h3zLPqDU/exec";
        let allItems = [];
        let cart = [];
        let currentCat = 'ทั้งหมด';

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('smart_school_user'));
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('userNameDisplay').innerText = user.name || user.username;
            if (user.role === 'ผู้ดูแลระบบ' || user.role === 'Admin') document.getElementById('adminLinkPlaceholder').innerHTML = `<a href="admin_dashboard.html" class="nav-item"><i class="fas fa-lock"></i> Admin Portal</a>`;
            loadInitial();
        });

        async function loadInitial() {
            try {
                const [inv, cat] = await Promise.all([
                    fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_inventory' }) }).then(r => r.json()),
                    fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_categories' }) }).then(r => r.json())
                ]);
                if (inv.status === 'success') { allItems = inv.data; renderInventory(); }
                if (cat.status === 'success') {
                    const filterWrap = document.getElementById('categoryFilters');
                    cat.data.forEach(c => filterWrap.innerHTML += `<button class="btn" onclick="filterCategory('${c}')">${c}</button>`);
                }
            } catch (e) {}
        }

        function renderInventory() {
            const tbody = document.getElementById('inventoryTbody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allItems.filter(i => (currentCat === 'ทั้งหมด' || i.category === currentCat) && (i.name.toLowerCase().includes(search) || i.id.toLowerCase().includes(search)));
            
            tbody.innerHTML = filtered.map(i => {
                const balance = parseInt(i.balance) || 0;
                const inCart = cart.find(c => c.id === i.id);
                return `
                    <tr style="${balance <= 0 ? 'opacity: 0.5' : ''}">
                        <td>
                            <div style="font-weight: 700;">${i.name}</div>
                            <div class="mono" style="font-size: 10px;">${i.id}</div>
                        </td>
                        <td>${i.category}</td>
                        <td style="text-align: center; color: ${balance < 5 ? 'red' : 'inherit'}">${balance}</td>
                        <td>
                            <div class="qty-control">
                                <button onclick="adjustQty('${i.id}', -1, ${balance})">-</button>
                                <input id="qty_${i.id}" value="${inCart ? inCart.qty : 1}" readonly>
                                <button onclick="adjustQty('${i.id}', 1, ${balance})">+</button>
                            </div>
                        </td>
                        <td style="text-align: right;">
                            <button class="btn ${inCart ? 'btn-primary' : ''}" onclick="addToCart('${i.id}', '${i.name}', ${balance})" ${balance <= 0 ? 'disabled' : ''}>
                                <i class="fas ${inCart ? 'fa-check-circle' : 'fa-plus'}"></i> ${inCart ? 'ในตะกร้า' : 'เพิ่ม'}
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function adjustQty(id, d, max) {
            const el = document.getElementById(`qty_${id}`);
            let v = Math.min(Math.max(parseInt(el.value) + d, 1), max);
            el.value = v;
        }

        function filterCategory(c) {
            currentCat = c;
            document.querySelectorAll('#categoryFilters .btn').forEach(b => b.classList.toggle('active', b.innerText === c));
            renderInventory();
        }

        function addToCart(id, name, max) {
            const qty = parseInt(document.getElementById(`qty_${id}`).value);
            const idx = cart.findIndex(c => c.id === id);
            if (idx > -1) cart[idx].qty = qty;
            else cart.push({ id, name, qty, max });
            updateCartUI();
            renderInventory();
        }

        function updateCartUI() {
            document.getElementById('cartBar').style.display = cart.length ? 'block' : 'none';
            document.getElementById('cartCount').innerText = cart.length;
        }

        function openCartModal() {
            document.getElementById('cartModal').style.display = 'flex';
            document.getElementById('cartItemList').innerHTML = cart.map((c, i) => `
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0;">
                    <div><strong>${c.name}</strong> (x${c.qty})</div>
                    <button class="btn" onclick="cart.splice(${i}, 1); updateCartUI(); renderInventory(); openCartModal();" style="padding: 2px 8px; color: red;">ลบ</button>
                </div>
            `).join('');
        }
        function closeCartModal() { document.getElementById('cartModal').style.display = 'none'; }

        async function submitBorrow() {
            if (!cart.length) return;
            const btn = document.getElementById('btnSubmit');
            const user = JSON.parse(localStorage.getItem('smart_school_user'));
            const data = {
                action: 'batch_borrow',
                userId: user.user_id,
                reason: document.getElementById('borrowReason').value.trim() || 'เบิกใช้งานตามปกติ',
                duration: document.getElementById('borrowDuration').value,
                items: cart
            };
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังส่ง...';
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                const r = await res.json();
                if(r.status === 'success') { alert("ส่งคำขอสำเร็จ!"); window.location.href = 'dashboard.html'; }
                else { alert(r.message); }
            } catch(e) { alert("ล้มเหลว"); }
            finally { btn.disabled = false; btn.innerHTML = 'ส่งคำขอเบิกพัสดุ'; }
        }
    </script>
</body>
</html>
